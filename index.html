<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>林業GIS Pro (Forestry Scout)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GeoTIFF解析とQRコード生成ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <!-- QRコード読取(jsQR) -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        body { 
            touch-action: none; 
            overflow: hidden; 
            background-color: #0f172a; 
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior: none; /* iOSのスワイプバック等を防止 */
        }
        .transition-transform { transition-property: transform; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
        .pop-anim { animation: pop 0.2s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #60a5fa; }
            100% { transform: scale(1); }
        }
        .sheet-collapsed { transform: translateY(calc(100% - 70px)) !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        /* カスタムQRスキャナーUI用スタイル */
        #qr-reader video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #qr-reader .qr-frame {
            position: absolute;
            inset: 12%;
            border: 2px solid #22c55e;
            border-radius: 12px;
            box-shadow: 0 0 24px rgba(34, 197, 94, 0.6);
            pointer-events: none;
        }
    </style>
</head>
<body class="text-slate-200 font-sans">

    <!-- 1. メインCanvas -->
    <canvas id="mapCanvas" class="fixed inset-0 w-full h-full z-0"></canvas>

    <!-- 2. ヘッダー -->
    <header id="app-header" class="fixed top-0 inset-x-0 h-14 bg-slate-900/80 backdrop-blur-md border-b border-slate-700 flex items-center justify-between px-4 z-40 transition-transform">
        <div class="flex items-center gap-2 overflow-hidden" onclick="UI.toggleSideMenu(true)">
            <!-- 現場アイコン -->
            <svg class="w-5 h-5 text-blue-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span id="header-site-name" class="font-bold text-sm truncate">⚠ 現場看板QRをスキャンしてください</span>
        </div>
    </header>

    <!-- 3. FAB (右上のアクションボタン) -->
    <div class="fixed right-4 top-20 flex flex-col gap-3 z-30">
        <!-- メニューボタン -->
        <button onclick="UI.toggleSideMenu(true)" class="w-12 h-12 bg-slate-800 rounded-full shadow-lg border border-slate-600 flex items-center justify-center active:bg-slate-700">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <!-- GPS 現在地ボタン (ナビゲーション矢印に変更) -->
        <button onclick="MAP.centerOnGPS()" class="w-12 h-12 bg-slate-800 rounded-full shadow-lg border border-slate-600 flex items-center justify-center active:bg-slate-700">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
        <!-- QR スキャンボタン (カメラアイコンに変更) -->
        <button onclick="QR.startScan()" class="w-12 h-12 bg-blue-600 rounded-full shadow-lg border border-blue-500 flex items-center justify-center active:bg-blue-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
    </div>

    <!-- 4. 作業記録開始ボタン -->
    <div id="btn-open-record" class="fixed right-4 bottom-6 z-30">
        <button onclick="UI.openBottomSheet()" class="w-16 h-16 bg-green-600 text-white rounded-full shadow-2xl border-2 border-green-400 flex items-center justify-center active:scale-95 transition-transform">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
        </button>
    </div>

    <!-- 5. 記録モード (スマート・ボトムシート) -->
    <div id="bottom-sheet" class="fixed inset-x-0 bottom-0 bg-slate-900 border-t border-slate-700 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-50 transform translate-y-full transition-transform duration-300 flex flex-col h-[65vh]">
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-700 bg-slate-800 rounded-t-3xl" onclick="UI.expandBottomSheet()">
            <div class="flex flex-col">
                <div class="w-10 h-1 bg-slate-500 rounded-full mb-1 mx-auto"></div>
                <span id="current-tool-label" class="text-sm font-bold text-slate-300">モードを選択してください</span>
            </div>
            <button onclick="UI.closeBottomSheet(event)" class="px-4 py-2 bg-slate-700 rounded-lg text-sm font-bold active:bg-slate-600">保存して戻る</button>
        </div>

        <div class="flex border-b border-slate-800 shrink-0">
            <button onclick="UI.switchTab('paint')" id="tab-btn-paint" class="flex-1 py-3 text-center font-bold border-b-2 border-blue-500 text-blue-400">ペイント</button>
            <button onclick="UI.switchTab('counter')" id="tab-btn-counter" class="flex-1 py-3 text-center font-bold border-b-2 border-transparent text-slate-500">カウンター</button>
        </div>

        <div id="tab-paint" class="p-4 grid grid-cols-2 gap-3 overflow-y-auto pb-8">
            <button onclick="MAP.setBrush(1, '伐採', '#ef4444')" class="paint-btn bg-slate-800 p-4 rounded-xl border-2 border-slate-700 flex flex-col items-center gap-2 active:bg-slate-700">
                <div class="w-8 h-8 rounded-full bg-red-500/80 border border-red-400"></div><span class="font-bold">伐採 (1)</span>
            </button>
            <button onclick="MAP.setBrush(2, '集材', '#3b82f6')" class="paint-btn bg-slate-800 p-4 rounded-xl border-2 border-slate-700 flex flex-col items-center gap-2 active:bg-slate-700">
                <div class="w-8 h-8 rounded-full bg-blue-500/80 border border-blue-400"></div><span class="font-bold">集材 (2)</span>
            </button>
            <button onclick="MAP.setBrush(3, '造材', '#eab308')" class="paint-btn bg-slate-800 p-4 rounded-xl border-2 border-slate-700 flex flex-col items-center gap-2 active:bg-slate-700">
                <div class="w-8 h-8 rounded-full bg-yellow-500/80 border border-yellow-400"></div><span class="font-bold">造材 (3)</span>
            </button>
            <button onclick="MAP.setBrush(4, '運材', '#a855f7')" class="paint-btn bg-slate-800 p-4 rounded-xl border-2 border-slate-700 flex flex-col items-center gap-2 active:bg-slate-700">
                <div class="w-8 h-8 rounded-full bg-purple-500/80 border border-purple-400"></div><span class="font-bold">運材 (4)</span>
            </button>
            <button onclick="MAP.setBrush(0, '消しゴム', '#94a3b8')" class="paint-btn col-span-2 bg-slate-800 p-4 rounded-xl border-2 border-slate-700 flex justify-center items-center gap-2 active:bg-slate-700">
                <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                <span class="font-bold">消しゴム</span>
            </button>
        </div>

        <div id="tab-counter" class="hidden flex-1 overflow-y-auto p-4 flex flex-col gap-4 pb-8">
            <!-- 動的に生成 -->
        </div>
    </div>

    <!-- 6. サイドメニュー (ダッシュボード) -->
    <div id="side-menu-bg" onclick="UI.toggleSideMenu(false)" class="fixed inset-0 bg-black/50 z-50 hidden backdrop-blur-sm"></div>
    <div id="side-menu" class="fixed inset-y-0 right-0 w-80 max-w-[85vw] bg-slate-900 border-l border-slate-700 z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center shrink-0">
            <h2 class="font-bold text-lg">現場ダッシュボード</h2>
            <button onclick="UI.toggleSideMenu(false)" class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-6">
            <!-- サマリー (カウンターの数値のみ) -->
            <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h3 class="text-xs text-slate-400 font-bold mb-3 uppercase tracking-wider">アクティブ現場実績</h3>
                <div id="summary-content" class="text-sm">データがありません</div>
            </div>

            <div class="bg-blue-900/30 rounded-xl p-4 border border-blue-800">
                <h3 class="text-xs text-blue-400 font-bold mb-3 uppercase tracking-wider flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Sync Hub
                </h3>
                <div class="flex flex-col gap-2">
                    <button onclick="SYNC.openMergeScanner()" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold flex justify-center items-center gap-2">
                        仲間と同期 (マージ)
                    </button>
                    <button onclick="SYNC.showExportQR()" class="bg-slate-700 hover:bg-slate-600 p-3 rounded-lg font-bold flex justify-center items-center gap-2">
                        PCへ提出 (QR生成)
                    </button>
                </div>
            </div>

            <div>
                <h3 class="text-xs text-slate-400 font-bold mb-3 uppercase tracking-wider">現場リスト</h3>
                <div id="site-list" class="flex flex-col gap-2">
                    <!-- 動的に生成 -->
                </div>
                <button onclick="DB.loadDemoSite()" class="mt-3 w-full border border-dashed border-slate-600 text-slate-400 p-3 rounded-lg font-bold hover:bg-slate-800 transition-colors">
                    + デモ現場をロード
                </button>
            </div>

            <!-- オフライン地図設定 UI -->
            <div class="pt-2 border-t border-slate-700">
                <h3 class="text-xs text-slate-400 font-bold mb-3 uppercase tracking-wider">オフライン地図</h3>
                <label class="w-full bg-slate-800 border border-slate-600 hover:bg-slate-700 text-sm p-3 rounded-lg font-bold flex items-center justify-center gap-2 cursor-pointer transition-colors text-slate-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    GeoTIFF / 画像をロード
                    <input type="file" accept=".tif,.tiff,.jpg,.png" class="hidden" onchange="MAP.loadBackground(event)">
                </label>
            </div>
        </div>
    </div>

    <!-- 7. QRモーダル -->
    <div id="qr-modal" class="fixed inset-0 bg-black/90 z-[60] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 shrink-0">
            <h2 id="qr-modal-title" class="font-bold">QRスキャン</h2>
            <button onclick="QR.close()" class="p-2 bg-slate-800 rounded-full"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center p-4">
            
            <!-- スキャン画面 (カメラ / ファイル読込) -->
            <div id="qr-reader" class="w-full max-w-sm bg-white rounded-lg overflow-hidden border-2 border-slate-700 text-black flex flex-col">
                <div class="relative bg-black w-full aspect-square">
                    <video id="qr-video" class="w-full h-full" autoplay muted playsinline></video>
                    <div class="qr-frame"></div>
                </div>
                <div class="p-3 space-y-2 text-xs text-slate-700">
                    <p class="font-bold">カメラQRスキャン</p>
                    <p>QRコードを枠内にゆっくり近づけてください。うまく起動しない場合はブラウザのカメラ権限とHTTPS接続をご確認ください。</p>
                    <label class="mt-1 inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 cursor-pointer font-bold text-xs">
                        画像ファイルから読み取る
                        <input id="qr-file-input" type="file" accept="image/*" class="hidden" onchange="QR.scanImageFile(event)">
                    </label>
                </div>
                <canvas id="qr-canvas" class="hidden"></canvas>
            </div>
            
            <!-- 生成・表示画面 -->
            <div id="qr-display" class="hidden bg-white p-6 rounded-xl w-full max-w-sm flex flex-col items-center justify-center">
                <!-- 実際のQRコードが描画されるコンテナ -->
                <div id="qr-canvas-container" class="flex justify-center items-center bg-white p-2 rounded-lg"></div>
                <p class="mt-4 text-sm text-slate-600 font-bold">PCのカメラで読み取ってください</p>
                <!-- バックアップ用テキスト -->
                <div class="mt-2 w-full h-16 overflow-y-auto bg-slate-100 p-2 rounded cursor-text" style="user-select: text; -webkit-user-select: text;">
                    <p class="font-mono text-[10px] break-all text-slate-800" id="qr-export-text"></p>
                </div>
                <button onclick="SYNC.copyExportQR()" class="mt-2 w-full bg-blue-100 text-blue-700 py-3 rounded-lg text-sm font-bold active:bg-blue-200 transition-colors">
                    クリップボードにコピー
                </button>
            </div>
        </div>
    </div>

    <!-- --- JavaScript ロジック --- -->
    <script>
        const STATE = {
            activeSiteId: null,
            currentSite: null, 
            mode: 'view', 
            brush: { val: 1, name: '伐採', color: '#ef4444' }, 
            bgImage: null, 
            countersConf: [
                { idx: 0, name: '伐採', step: 1, unit: '本' },
                { idx: 1, name: '集材', step: 1, unit: '本' },
                { idx: 2, name: '造材', step: 1, unit: '本' },
                { idx: 3, name: '運材', step: 1, unit: '台' }
            ]
        };

        // IndexedDB 管理
        const DB = {
            db: null,
            init: () => {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('ForestryScoutDB', 1);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('workSites')) {
                            db.createObjectStore('workSites', { keyPath: 'siteId' });
                        }
                    };
                    req.onsuccess = (e) => {
                        DB.db = e.target.result;
                        resolve();
                    };
                    req.onerror = (e) => reject(e);
                });
            },
            saveSite: (siteData) => {
                const tx = DB.db.transaction('workSites', 'readwrite');
                siteData.lastUpdated = Date.now();
                tx.objectStore('workSites').put(siteData);
                return tx.complete;
            },
            getSite: (siteId) => {
                return new Promise((resolve) => {
                    const tx = DB.db.transaction('workSites', 'readonly');
                    const req = tx.objectStore('workSites').get(siteId);
                    req.onsuccess = () => resolve(req.result);
                });
            },
            getAllSites: () => {
                return new Promise((resolve) => {
                    const tx = DB.db.transaction('workSites', 'readonly');
                    const req = tx.objectStore('workSites').getAll();
                    req.onsuccess = () => resolve(req.result);
                });
            },
            loadDemoSite: async () => {
                const demoId = 'demo-' + Date.now();
                const lat = 35.0, lon = 138.0;
                const d = 0.002;
                const newSite = {
                    siteId: demoId,
                    name: '林小班 デモエリア',
                    polygon: [[lon, lat], [lon+d, lat], [lon+d, lat+d], [lon, lat+d]],
                    bbox: [lon, lat, lon+d, lat+d], 
                    paintData: Array(1600).fill(0), 
                    counters: [0, 0, 0, 0]
                };
                await DB.saveSite(newSite);
                await App.loadSite(demoId);
                UI.toggleSideMenu(false);
            }
        };

        // RLE圧縮エンジン（PC版と共通仕様：RLE文字列(A〜E)をBase64化）
        const RLE = {
            // arr: 長さ1600の数値配列(0〜4)
            encode: (arr) => {
                const map = ['A', 'B', 'C', 'D', 'E']; // 0〜4 を A〜E にマップ
                let rle = '';
                let count = 1;
                for (let i = 1; i <= arr.length; i++) {
                    if (arr[i] === arr[i - 1]) {
                        count++;
                    } else {
                        const v = arr[i - 1] || 0;
                        const letter = map[v] || 'A';
                        rle += `${count}${letter}`;
                        count = 1;
                    }
                }
                // ブラウザ環境前提なので btoa を利用
                try {
                    return btoa(rle);
                } catch (e) {
                    // 何らかの理由でBase64化に失敗した場合は素の文字列を返す（後段のデコーダで両対応）
                    return rle;
                }
            },
            decode: (str) => {
                const res = Array(1600).fill(0);
                if (!str) return res;

                // まず PC版仕様(Base64化されたRLE A〜E)として解釈を試みる
                try {
                    const rle = atob(str);
                    const revMap = { A: 0, B: 1, C: 2, D: 3, E: 4 };
                    let ptr = 0;
                    const regex = /(\d+)([ABCDE])/g;
                    let match;
                    while ((match = regex.exec(rle)) !== null) {
                        const count = parseInt(match[1], 10);
                        const val = revMap[match[2]] ?? 0;
                        for (let i = 0; i < count && ptr < 1600; i++) {
                            res[ptr++] = val;
                        }
                    }
                    return res;
                } catch (e) {
                    // Base64として解釈できなかった場合は、旧フォーマット(例: "30,21")として扱う
                    let ptr = 0;
                    str.split(',').forEach(part => {
                        const match = part.match(/(\d+)(\d)/);
                        if (match) {
                            const count = parseInt(match[1], 10);
                            const val = parseInt(match[2], 10);
                            for (let i = 0; i < count && ptr < 1600; i++) {
                                res[ptr++] = val;
                            }
                        }
                    });
                    return res;
                }
            }
        };

        // UI コントローラー
        const UI = {
            init: () => {
                UI.renderCounters();
                UI.updateHeader();
            },
            updateHeader: () => {
                const el = document.getElementById('header-site-name');
                if (STATE.currentSite) {
                    el.innerText = `📍 ${STATE.currentSite.name}`;
                    el.classList.remove('text-slate-400');
                } else {
                    el.innerText = `⚠ 現場看板QRをスキャンしてください`;
                    el.classList.add('text-slate-400');
                }
            },
            toggleSideMenu: async (show) => {
                const menu = document.getElementById('side-menu');
                const bg = document.getElementById('side-menu-bg');
                if (show) {
                    await UI.renderSideMenu();
                    menu.classList.remove('translate-x-full');
                    bg.classList.remove('hidden');
                } else {
                    menu.classList.add('translate-x-full');
                    bg.classList.add('hidden');
                }
            },
            openBottomSheet: () => {
                STATE.mode = 'paint';
                document.getElementById('bottom-sheet').classList.remove('translate-y-full', 'sheet-collapsed');
                document.getElementById('btn-open-record').classList.add('translate-y-24');
                document.getElementById('app-header').classList.add('-translate-y-full');
                UI.updateToolLabel();
            },
            closeBottomSheet: (e) => {
                if(e) e.stopPropagation();
                STATE.mode = 'view';
                document.getElementById('bottom-sheet').classList.add('translate-y-full');
                document.getElementById('bottom-sheet').classList.remove('sheet-collapsed');
                document.getElementById('btn-open-record').classList.remove('translate-y-24');
                document.getElementById('app-header').classList.remove('-translate-y-full');
                if(STATE.currentSite) DB.saveSite(STATE.currentSite); 
                UI.renderSideMenu(); 
            },
            expandBottomSheet: () => {
                document.getElementById('bottom-sheet').classList.remove('sheet-collapsed');
            },
            collapseToToolbar: () => {
                if (!document.getElementById('tab-paint').classList.contains('hidden')) {
                    document.getElementById('bottom-sheet').classList.add('sheet-collapsed');
                }
            },
            switchTab: (tab) => {
                document.getElementById('tab-paint').classList.toggle('hidden', tab !== 'paint');
                document.getElementById('tab-counter').classList.toggle('hidden', tab !== 'counter');
                document.getElementById('tab-btn-paint').className = tab === 'paint' ? 'flex-1 py-3 text-center font-bold border-b-2 border-blue-500 text-blue-400' : 'flex-1 py-3 text-center font-bold border-b-2 border-transparent text-slate-500';
                document.getElementById('tab-btn-counter').className = tab === 'counter' ? 'flex-1 py-3 text-center font-bold border-b-2 border-blue-500 text-blue-400' : 'flex-1 py-3 text-center font-bold border-b-2 border-transparent text-slate-500';
                
                if(tab === 'counter') document.getElementById('bottom-sheet').classList.remove('sheet-collapsed');
            },
            updateToolLabel: () => {
                document.getElementById('current-tool-label').innerText = `${STATE.brush.name} モード`;
            },
            renderCounters: () => {
                const container = document.getElementById('tab-counter');
                container.innerHTML = '';
                STATE.countersConf.forEach(conf => {
                    const val = STATE.currentSite ? STATE.currentSite.counters[conf.idx] : 0;
                    const html = `
                        <div class="bg-slate-800 rounded-2xl p-4 flex items-center justify-between border border-slate-700 shadow-sm">
                            <span class="font-bold text-lg w-16">${conf.name}</span>
                            <div class="flex items-center gap-4">
                                <button onpointerdown="CounterCtrl.start(${conf.idx}, -${conf.step})" onpointerup="CounterCtrl.stop()" onpointerleave="CounterCtrl.stop()" class="w-14 h-14 bg-slate-700 rounded-xl flex items-center justify-center text-2xl active:bg-slate-600 shadow-inner">-</button>
                                <div class="w-20 text-center flex flex-col items-center">
                                    <span id="counter-val-${conf.idx}" class="text-3xl font-mono font-bold">${val}</span>
                                    <span class="text-xs text-slate-400">${conf.unit}</span>
                                </div>
                                <button onpointerdown="CounterCtrl.start(${conf.idx}, ${conf.step})" onpointerup="CounterCtrl.stop()" onpointerleave="CounterCtrl.stop()" class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center text-2xl font-bold active:bg-blue-500 shadow-lg">+</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                });
            },
            renderSideMenu: async () => {
                const summaryEl = document.getElementById('summary-content');
                if (STATE.currentSite) {
                    const c = STATE.currentSite.counters;
                    summaryEl.innerHTML = `
                        <div class="grid grid-cols-2 gap-3 text-slate-300">
                            <div class="bg-slate-700/40 p-3 rounded-lg flex flex-col items-center">
                                <span class="text-xs text-slate-400">🌲伐採</span>
                                <div><span class="font-bold text-xl text-white">${c[0]}</span> <span class="text-xs">本</span></div>
                            </div>
                            <div class="bg-slate-700/40 p-3 rounded-lg flex flex-col items-center">
                                <span class="text-xs text-slate-400">🚜集材</span>
                                <div><span class="font-bold text-xl text-white">${c[1]}</span> <span class="text-xs">本</span></div>
                            </div>
                            <div class="bg-slate-700/40 p-3 rounded-lg flex flex-col items-center">
                                <span class="text-xs text-slate-400">🪚造材</span>
                                <div><span class="font-bold text-xl text-white">${c[2]}</span> <span class="text-xs">本</span></div>
                            </div>
                            <div class="bg-slate-700/40 p-3 rounded-lg flex flex-col items-center">
                                <span class="text-xs text-slate-400">🚚運材</span>
                                <div><span class="font-bold text-xl text-white">${c[3]}</span> <span class="text-xs">台</span></div>
                            </div>
                        </div>
                    `;
                } else {
                    summaryEl.innerText = '現場が選択されていません';
                }

                const sites = await DB.getAllSites();
                const listEl = document.getElementById('site-list');
                listEl.innerHTML = '';
                sites.sort((a,b) => b.lastUpdated - a.lastUpdated).forEach(s => {
                    const isActive = s.siteId === STATE.activeSiteId;
                    const dateStr = new Date(s.lastUpdated).toLocaleDateString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    listEl.innerHTML += `
                        <div onclick="App.loadSite('${s.siteId}')" class="p-3 rounded-lg border cursor-pointer transition-colors ${isActive ? 'bg-blue-900/50 border-blue-500' : 'bg-slate-800 border-slate-700 hover:bg-slate-700'}">
                            <div class="font-bold flex items-center justify-between">
                                <span class="truncate">${s.name}</span>
                                ${isActive ? '<span class="flex w-2 h-2 shrink-0 rounded-full bg-blue-500 ml-2"></span>' : ''}
                            </div>
                            <div class="text-xs text-slate-500 mt-1">最終更新: ${dateStr}</div>
                        </div>
                    `;
                });
            }
        };

        const CounterCtrl = {
            timer: null,
            interval: null,
            start: (idx, delta) => {
                CounterCtrl.update(idx, delta);
                CounterCtrl.timer = setTimeout(() => {
                    CounterCtrl.interval = setInterval(() => CounterCtrl.update(idx, delta), 150);
                }, 400); 
            },
            stop: () => {
                clearTimeout(CounterCtrl.timer);
                clearInterval(CounterCtrl.interval);
                if(STATE.currentSite) DB.saveSite(STATE.currentSite); 
            },
            update: (idx, delta) => {
                if (!STATE.currentSite) return;
                let val = STATE.currentSite.counters[idx] + delta;
                if (val < 0) val = 0;
                STATE.currentSite.counters[idx] = val;
                
                const el = document.getElementById(`counter-val-${idx}`);
                if(el) {
                    el.innerText = val;
                    el.classList.remove('pop-anim');
                    void el.offsetWidth; 
                    el.classList.add('pop-anim');
                }
                
                if (navigator.vibrate) navigator.vibrate(15);
            }
        };

        const MAP = {
            canvas: null,
            ctx: null,
            transform: { x: 0, y: 0, scale: 1 },
            isDrawing: false,
            
            lastTouch: null,
            initialPinchDist: null,
            initialScale: 1,

            init: () => {
                MAP.canvas = document.getElementById('mapCanvas');
                MAP.ctx = MAP.canvas.getContext('2d');
                MAP.resize();
                window.addEventListener('resize', MAP.resize);
                MAP.setupTouch();
                MAP.loop();
            },
            resize: () => {
                MAP.canvas.width = window.innerWidth;
                MAP.canvas.height = window.innerHeight;
            },
            setBrush: (val, name, color) => {
                STATE.brush = { val, name, color };
                UI.updateToolLabel();
                UI.collapseToToolbar(); 
                
                document.querySelectorAll('.paint-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-900/30'));
                event.currentTarget.classList.add('border-blue-500', 'bg-blue-900/30');
            },
            
            lon2x: (lon) => {
                if(!STATE.currentSite) return 0;
                const [w, s, e, n] = STATE.currentSite.bbox;
                return ((lon - w) / (e - w)) * 800;
            },
            lat2y: (lat) => {
                if(!STATE.currentSite) return 0;
                const [w, s, e, n] = STATE.currentSite.bbox;
                return ((n - lat) / (n - s)) * 800; 
            },

            setupTouch: () => {
                const getDistance = (touches) => {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    return Math.sqrt(dx * dx + dy * dy);
                };
                
                const getCenter = (touches) => {
                    return {
                        x: (touches[0].clientX + touches[1].clientX) / 2,
                        y: (touches[0].clientY + touches[1].clientY) / 2
                    };
                };

                MAP.canvas.addEventListener('pointerdown', (e) => {
                    if (e.pointerType !== 'mouse') return; 
                    if (STATE.mode === 'paint') {
                        MAP.isDrawing = true;
                        MAP.paintCell(e.clientX, e.clientY);
                    } else {
                        MAP.lastTouch = { x: e.clientX, y: e.clientY };
                    }
                });
                MAP.canvas.addEventListener('pointermove', (e) => {
                    if (e.pointerType !== 'mouse') return;
                    if (STATE.mode === 'paint' && MAP.isDrawing) {
                        MAP.paintCell(e.clientX, e.clientY);
                    } else if (STATE.mode === 'view' && MAP.lastTouch) {
                        MAP.transform.x += e.clientX - MAP.lastTouch.x;
                        MAP.transform.y += e.clientY - MAP.lastTouch.y;
                        MAP.lastTouch = { x: e.clientX, y: e.clientY };
                    }
                });
                const endPointer = () => { MAP.isDrawing = false; MAP.lastTouch = null; };
                MAP.canvas.addEventListener('pointerup', endPointer);
                MAP.canvas.addEventListener('pointerleave', endPointer);

                MAP.canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) {
                        if (STATE.mode === 'paint') {
                            MAP.isDrawing = true;
                            MAP.paintCell(e.touches[0].clientX, e.touches[0].clientY);
                        } else {
                            MAP.lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                        }
                    } else if (e.touches.length === 2 && STATE.mode === 'view') {
                        MAP.initialPinchDist = getDistance(e.touches);
                        MAP.initialScale = MAP.transform.scale;
                        MAP.lastTouch = getCenter(e.touches);
                    }
                }, { passive: false });

                MAP.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault(); 
                    if (e.touches.length === 1) {
                        if (STATE.mode === 'paint' && MAP.isDrawing) {
                            MAP.paintCell(e.touches[0].clientX, e.touches[0].clientY);
                        } else if (STATE.mode === 'view' && MAP.lastTouch && !MAP.initialPinchDist) {
                            MAP.transform.x += e.touches[0].clientX - MAP.lastTouch.x;
                            MAP.transform.y += e.touches[0].clientY - MAP.lastTouch.y;
                            MAP.lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                        }
                    } else if (e.touches.length === 2 && STATE.mode === 'view') {
                        const dist = getDistance(e.touches);
                        const center = getCenter(e.touches);
                        
                        if (MAP.initialPinchDist) {
                            const newScale = Math.max(0.2, Math.min(MAP.initialScale * (dist / MAP.initialPinchDist), 5));
                            
                            MAP.transform.x = center.x - (center.x - MAP.transform.x) * (newScale / MAP.transform.scale);
                            MAP.transform.y = center.y - (center.y - MAP.transform.y) * (newScale / MAP.transform.scale);
                            MAP.transform.scale = newScale;
                            
                            MAP.transform.x += center.x - MAP.lastTouch.x;
                            MAP.transform.y += center.y - MAP.lastTouch.y;
                            MAP.lastTouch = center;
                        }
                    }
                }, { passive: false });

                const endTouch = () => {
                    MAP.isDrawing = false;
                    MAP.lastTouch = null;
                    MAP.initialPinchDist = null;
                };
                MAP.canvas.addEventListener('touchend', endTouch);
                MAP.canvas.addEventListener('touchcancel', endTouch);
                
                MAP.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = -e.deltaY * 0.001;
                    const newScale = Math.max(0.2, Math.min(MAP.transform.scale * (1 + delta), 5));
                    
                    MAP.transform.x = e.clientX - (e.clientX - MAP.transform.x) * (newScale / MAP.transform.scale);
                    MAP.transform.y = e.clientY - (e.clientY - MAP.transform.y) * (newScale / MAP.transform.scale);
                    MAP.transform.scale = newScale;
                }, {passive: false});
            },

            loadBackground: async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!STATE.currentSite) {
                    alert("先に現場（ポリゴン）をロードして選択してください。");
                    e.target.value = "";
                    return;
                }

                UI.toggleSideMenu(false);
                alert("地図を読み込んでいます...");

                try {
                    if (file.type === 'image/jpeg' || file.type === 'image/png') {
                        const url = URL.createObjectURL(file);
                        const img = new Image();
                        img.onload = () => { 
                            STATE.bgImage = img; 
                            alert("地図の読み込みが完了しました。");
                        };
                        img.onerror = () => alert("画像の読み込みに失敗しました。");
                        img.src = url;
                    } else if (file.name.endsWith('.tif') || file.name.endsWith('.tiff')) {
                        const arrayBuffer = await file.arrayBuffer();
                        const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
                        const image = await tiff.getImage();
                        const width = image.getWidth();
                        const height = image.getHeight();
                        
                        const rasters = await image.readRasters();
                        
                        const offscreen = document.createElement('canvas');
                        offscreen.width = width;
                        offscreen.height = height;
                        const ctx = offscreen.getContext('2d');
                        const imgData = ctx.createImageData(width, height);
                        
                        let r, g, b;
                        for (let i = 0; i < width * height; i++) {
                            r = rasters[0][i];
                            g = rasters.length > 1 ? rasters[1][i] : r;
                            b = rasters.length > 2 ? rasters[2][i] : r;
                            
                            imgData.data[i * 4] = r;
                            imgData.data[i * 4 + 1] = g;
                            imgData.data[i * 4 + 2] = b;
                            imgData.data[i * 4 + 3] = 255; 
                        }
                        ctx.putImageData(imgData, 0, 0);
                        STATE.bgImage = offscreen;
                        alert("地図の読み込みが完了しました。");
                    } else {
                        alert("対応していないファイル形式です。");
                    }
                } catch (err) {
                    console.error(err);
                    alert("地図画像の読み込みに失敗しました。ファイル形式を確認してください。");
                }
                
                e.target.value = "";
            },

            paintCell: (screenX, screenY) => {
                if (!STATE.currentSite) return;
                const logicX = (screenX - MAP.transform.x) / MAP.transform.scale;
                const logicY = (screenY - MAP.transform.y) / MAP.transform.scale;
                
                const col = Math.floor(logicX / 20);
                const row = Math.floor(logicY / 20);
                
                if (col >= 0 && col < 40 && row >= 0 && row < 40) {
                    const idx = row * 40 + col;
                    if (STATE.currentSite.paintData[idx] !== STATE.brush.val) {
                        STATE.currentSite.paintData[idx] = STATE.brush.val;
                        if(navigator.vibrate) navigator.vibrate(5); 
                    }
                }
            },

            loop: () => {
                MAP.ctx.clearRect(0, 0, MAP.canvas.width, MAP.canvas.height);
                
                MAP.ctx.fillStyle = '#0f172a'; 
                MAP.ctx.fillRect(0,0, MAP.canvas.width, MAP.canvas.height);

                if (STATE.currentSite) {
                    MAP.ctx.save();
                    MAP.ctx.translate(MAP.transform.x, MAP.transform.y);
                    MAP.ctx.scale(MAP.transform.scale, MAP.transform.scale);

                    if (STATE.bgImage) {
                        const aspect = STATE.bgImage.width / STATE.bgImage.height;
                        let drawW = 800, drawH = 800; 
                        let offsetX = 0, offsetY = 0;

                        if (aspect > 1) { 
                            drawH = 800 / aspect;
                            offsetY = (800 - drawH) / 2;
                        } else { 
                            drawW = 800 * aspect;
                            offsetX = (800 - drawW) / 2;
                        }
                        MAP.ctx.drawImage(STATE.bgImage, offsetX, offsetY, drawW, drawH);
                    }

                    MAP.ctx.beginPath();
                    STATE.currentSite.polygon.forEach((p, i) => {
                        const x = MAP.lon2x(p[0]);
                        const y = MAP.lat2y(p[1]);
                        if (i === 0) MAP.ctx.moveTo(x, y);
                        else MAP.ctx.lineTo(x, y);
                    });
                    MAP.ctx.closePath();
                    MAP.ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    MAP.ctx.fill();
                    MAP.ctx.lineWidth = 2;
                    MAP.ctx.strokeStyle = '#ef4444'; 
                    MAP.ctx.stroke();

                    MAP.ctx.globalAlpha = 0.6;
                    for (let r = 0; r < 40; r++) {
                        for (let c = 0; c < 40; c++) {
                            const val = STATE.currentSite.paintData[r * 40 + c];
                            if (val > 0) {
                                switch(val) {
                                    case 1: MAP.ctx.fillStyle = '#ef4444'; break; 
                                    case 2: MAP.ctx.fillStyle = '#3b82f6'; break; 
                                    case 3: MAP.ctx.fillStyle = '#eab308'; break; 
                                    case 4: MAP.ctx.fillStyle = '#a855f7'; break; 
                                }
                                MAP.ctx.fillRect(c * 20, r * 20, 20, 20);
                            }
                        }
                    }
                    MAP.ctx.globalAlpha = 1.0;

                    MAP.ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                    MAP.ctx.lineWidth = 1;
                    MAP.ctx.strokeRect(0, 0, 800, 800);

                    MAP.ctx.restore();
                }

                if(STATE.mode === 'view') {
                    MAP.ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    MAP.ctx.beginPath();
                    MAP.ctx.moveTo(MAP.canvas.width/2 - 10, MAP.canvas.height/2);
                    MAP.ctx.lineTo(MAP.canvas.width/2 + 10, MAP.canvas.height/2);
                    MAP.ctx.moveTo(MAP.canvas.width/2, MAP.canvas.height/2 - 10);
                    MAP.ctx.lineTo(MAP.canvas.width/2, MAP.canvas.height/2 + 10);
                    MAP.ctx.stroke();
                }

                requestAnimationFrame(MAP.loop);
            },
            
            centerOnGPS: () => {
                if(!STATE.currentSite) return;
                MAP.transform.x = MAP.canvas.width / 2 - 400 * MAP.transform.scale;
                MAP.transform.y = MAP.canvas.height / 2 - 400 * MAP.transform.scale;
            }
        };

        const SYNC = {
            openMergeScanner: () => {
                if(!STATE.currentSite) return alert("現場を選択してください");
                QR.startScan((data) => {
                    try {
                        const payload = JSON.parse(data);
                        const isMergePayload = payload && payload.id && Array.isArray(payload.c) && typeof payload.p === 'string';
                        const isSitePayload = payload && payload.id && Array.isArray(payload.poly);

                        if (isMergePayload) {
                            if(payload.id !== STATE.activeSiteId) {
                                alert("別の現場のデータです。マージできません。");
                                return;
                            }
                            for(let i=0; i<4; i++) {
                                STATE.currentSite.counters[i] += (payload.c[i] || 0);
                            }
                            const extPaint = RLE.decode(payload.p);
                            for(let i=0; i<1600; i++) {
                                if(extPaint[i] > STATE.currentSite.paintData[i]) {
                                    STATE.currentSite.paintData[i] = extPaint[i]; 
                                }
                            }
                            DB.saveSite(STATE.currentSite);
                            UI.renderCounters();
                            UI.renderSideMenu();
                            alert("仲間のデータとマージ完了しました！");
                        } else if (isSitePayload) {
                            alert("このQRコードは新しい現場登録用です。ヘッダーのメッセージか右上のカメラボタンから読み込んでください。");
                        } else {
                            alert("無効なQRデータです");
                        }
                    } catch(e) {
                        alert("QRの解析に失敗しました。");
                        console.error(e);
                    }
                });
            },
            showExportQR: () => {
                if(!STATE.currentSite) return alert("現場を選択してください");
                const payload = {
                    id: STATE.activeSiteId,
                    c: STATE.currentSite.counters,
                    p: RLE.encode(STATE.currentSite.paintData)
                };
                const jsonStr = JSON.stringify(payload);
                document.getElementById('qr-modal-title').innerText = "PC提出用 QR";
                document.getElementById('qr-modal').classList.remove('hidden');
                document.getElementById('qr-display').classList.remove('hidden');
                document.getElementById('qr-reader').classList.add('hidden');
                
                const qrContainer = document.getElementById('qr-canvas-container');
                qrContainer.innerHTML = ''; 
                new QRCode(qrContainer, {
                    text: jsonStr,
                    width: 240,
                    height: 240,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L 
                });
                
                document.getElementById('qr-export-text').innerText = jsonStr; 
            },
            copyExportQR: () => {
                const text = document.getElementById('qr-export-text').innerText;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert("クリップボードにコピーしました！");
                } catch (err) {
                    alert("コピーに失敗しました。お手数ですが手動で選択してコピーしてください。");
                }
                document.body.removeChild(textArea);
            }
        };

        // 現場看板の分割QR（F1/4|...）を順に集めて結合する用
        let signboardChunkState = { total: 0, chunks: {} };
        function handleSignboardChunk(text) {
            const m = text.match(/^F(\d+)\/(\d+)\|([\s\S]*)$/);
            if (!m) return false;
            const idx = parseInt(m[1], 10), total = parseInt(m[2], 10), content = m[3];
            if (signboardChunkState.total !== total) signboardChunkState = { total, chunks: {} };
            signboardChunkState.chunks[idx] = content;
            const keys = Object.keys(signboardChunkState.chunks);
            if (keys.length === total) {
                let full = '';
                for (let i = 1; i <= total; i++) full += (signboardChunkState.chunks[i] || '');
                signboardChunkState = { total: 0, chunks: {} };
                QR.close();
                App.handleNewSiteQR(full);
            } else {
                const next = [1,2,3,4,5,6].slice(0, total).find(j => !signboardChunkState.chunks[j]);
                const labels = ['①','②','③','④','⑤','⑥'];
                alert(keys.length + "/" + total + " 枚目を読み取りました。次は " + (labels[next-1] || next) + " " + next + " 枚目をスキャンしてください。");
            }
            return true;
        }

        // 選択地物を直接QR化（1/3|...）のチャンクを集めてLZ復号し現場登録
        let directChunkState = { total: 0, chunks: {} };
        function handleDirectQRChunk(text) {
            const m = text.match(/^(\d+)\/(\d+)\|([\s\S]*)$/);
            if (!m) return false;
            const idx = parseInt(m[1], 10), total = parseInt(m[2], 10), content = m[3];
            if (directChunkState.total !== total) directChunkState = { total, chunks: {} };
            directChunkState.chunks[idx] = content;
            const keys = Object.keys(directChunkState.chunks);
            if (keys.length !== total) {
                const next = [1,2,3,4,5,6,7,8].slice(0, total).find(j => !directChunkState.chunks[j]);
                const labels = ['①','②','③','④','⑤','⑥'];
                alert(keys.length + "/" + total + " 枚目を読み取りました。次は " + (labels[next-1] || next) + " " + next + " 枚目をスキャンしてください。");
                return true;
            }
            let full = '';
            for (let i = 1; i <= total; i++) full += (directChunkState.chunks[i] || '');
            directChunkState = { total: 0, chunks: {} };
            try {
                const raw = (typeof LZString !== 'undefined' && LZString.decompressFromEncodedURIComponent)
                    ? LZString.decompressFromEncodedURIComponent(full)
                    : full;
                const parsed = JSON.parse(raw || '{}');
                if (parsed.type === 'featureCollection' && parsed.geom) {
                    parsed.id = parsed.id || 'import-' + Date.now();
                    if (!parsed.name) parsed.name = parsed.id;
                    QR.close();
                    App.handleNewSiteQR(JSON.stringify(parsed));
                } else {
                    QR.close();
                    App.handleNewSiteQR(JSON.stringify(parsed));
                }
            } catch (e) {
                console.error(e);
                alert("地物データの復号に失敗しました。");
            }
            return true;
        }

        // jsQR + getUserMedia を使ったカスタムQRスキャナー
        const QR = {
            stream: null,
            frameRequestId: null,
            callback: null,
            scanning: false,
            startScan: (callback = null) => {
                signboardChunkState = { total: 0, chunks: {} };
                directChunkState = { total: 0, chunks: {} };
                UI.toggleSideMenu(false);
                QR.callback = callback;
                document.getElementById('qr-modal-title').innerText = "QRスキャン";
                document.getElementById('qr-modal').classList.remove('hidden');
                document.getElementById('qr-display').classList.add('hidden');
                document.getElementById('qr-reader').classList.remove('hidden');

                QR.startCamera();
            },
            startCamera: () => {
                const video = document.getElementById('qr-video');
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("この端末やブラウザではカメラが利用できません。画像ファイルからの読み取りをご利用ください。");
                    return;
                }
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' } }
                }).then(stream => {
                    QR.stream = stream;
                    video.srcObject = stream;
                    video.play().catch(() => {});
                    QR.scanning = true;
                    QR.scanLoop();
                }).catch(err => {
                    console.error(err);
                    alert("カメラを起動できませんでした。ブラウザのカメラ権限やHTTPS接続をご確認ください。");
                });
            },
            scanLoop: () => {
                if (!QR.scanning) return;
                const video = document.getElementById('qr-video');
                const canvas = document.getElementById('qr-canvas');
                const ctx = canvas.getContext('2d');

                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    const width = video.videoWidth;
                    const height = video.videoHeight;
                    if (width && height) {
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(video, 0, 0, width, height);
                        const imageData = ctx.getImageData(0, 0, width, height);
                        const code = jsQR(imageData.data, width, height, { inversionAttempts: "dontInvert" });
                        if (code && code.data) {
                            QR.handleResult(code.data);
                        }
                    }
                }
                if (QR.scanning) QR.frameRequestId = requestAnimationFrame(QR.scanLoop);
            },
            scanImageFile: (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('qr-canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: "dontInvert" });
                        if (code && code.data) {
                            QR.handleResult(code.data);
                        } else {
                            alert("QRコードを検出できませんでした。画像のピントや明るさをご確認ください。");
                        }
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
                event.target.value = "";
            },
            handleResult: (decodedText) => {
                if (/^F\d+\/\d+\|/.test(decodedText)) {
                    handleSignboardChunk(decodedText);
                    return;
                }
                if (/^\d+\/\d+\|/.test(decodedText)) {
                    handleDirectQRChunk(decodedText);
                    return;
                }
                QR.close();
                if (QR.callback) {
                    QR.callback(decodedText);
                } else {
                    App.handleNewSiteQR(decodedText);
                }
            },
            stopCamera: () => {
                QR.scanning = false;
                if (QR.frameRequestId) {
                    cancelAnimationFrame(QR.frameRequestId);
                    QR.frameRequestId = null;
                }
                if (QR.stream) {
                    QR.stream.getTracks().forEach(t => t.stop());
                    QR.stream = null;
                }
                const video = document.getElementById('qr-video');
                if (video) {
                    video.srcObject = null;
                }
            },
            close: () => {
                QR.stopCamera();
                document.getElementById('qr-modal').classList.add('hidden');
            }
        };

        const App = {
            init: async () => {
                await DB.init();
                const sites = await DB.getAllSites();
                if(sites.length > 0) {
                    sites.sort((a,b) => b.lastUpdated - a.lastUpdated);
                    await App.loadSite(sites[0].siteId);
                }
                
                UI.init();
                MAP.init();
            },
            loadSite: async (siteId) => {
                const site = await DB.getSite(siteId);
                if (site) {
                    STATE.activeSiteId = site.siteId;
                    STATE.currentSite = site;
                    MAP.transform.x = window.innerWidth / 2 - 400;
                    MAP.transform.y = window.innerHeight / 2 - 400;
                    MAP.transform.scale = 1;
                    
                    UI.updateHeader();
                    UI.renderCounters();
                    UI.toggleSideMenu(false);
                }
            },
            handleNewSiteQR: async (jsonStr) => {
                try {
                    const raw = (jsonStr && typeof jsonStr === 'string') ? jsonStr.trim() : String(jsonStr);
                    if (!raw) { alert("QRの内容が空です"); return; }
                    const data = JSON.parse(raw);

                    // --- 1) 現場看板QR (PC → モバイル)
                    // 超コンパクト: { i, n?, b: \"wwwwwweeeeee\" }  (base36で bbox をエンコード)
                    // 標準: { id, name?, poly: [[lon,lat]...] }
                    // 旧: { type:\"checkin\", id, name, geom: GeoJSON FeatureCollection }
                    let poly = null;
                    let siteId = data.id || data.i;
                    let siteName = data.name || data.n || siteId;

                    if (typeof data.b === 'string' && data.b.length === 12) {
                        const decodePair = (str) => {
                            const lonInt = parseInt(str.slice(0, 3), 36);
                            const latInt = parseInt(str.slice(3, 6), 36);
                            const lon = lonInt / 100 - 180;
                            const lat = latInt / 100 - 90;
                            return [lon, lat];
                        };
                        const [w, s] = decodePair(data.b.slice(0, 6));
                        const [e, n] = decodePair(data.b.slice(6, 12));
                        poly = [[w, s], [e, s], [e, n], [w, n], [w, s]];
                    } else if (Array.isArray(data.b) && data.b.length >= 4) {
                        const [w, s, e, n] = data.b;
                        poly = [[w, s], [e, s], [e, n], [w, n], [w, s]];
                    } else if (Array.isArray(data.poly)) {
                        poly = data.poly;
                    } else if (data.geom && Array.isArray(data.geom.features) && data.geom.features.length > 0) {
                        const g = data.geom.features[0].geometry;
                        if (g && g.type === 'Polygon' && Array.isArray(g.coordinates) && g.coordinates.length > 0) {
                            poly = g.coordinates[0];
                        } else if (g && g.type === 'MultiPolygon' && Array.isArray(g.coordinates) && g.coordinates.length > 0) {
                            poly = g.coordinates[0][0];
                        } else if (g && g.type === 'LineString' && Array.isArray(g.coordinates) && g.coordinates.length > 0) {
                            poly = g.coordinates.concat([g.coordinates[0]]);
                        }
                    }

                    const isSiteQR = siteId && Array.isArray(poly);
                    const isResultQR = data && data.id && Array.isArray(data.c) && typeof data.p === 'string';

                    if (isSiteQR) {
                        let minLon=180, maxLon=-180, minLat=90, maxLat=-90;
                        poly.forEach(p => {
                            if(p[0] < minLon) minLon = p[0];
                            if(p[0] > maxLon) maxLon = p[0];
                            if(p[1] < minLat) minLat = p[1];
                            if(p[1] > maxLat) maxLat = p[1];
                        });
                        
                        const newSite = {
                            siteId: siteId,
                            name: siteName,
                            polygon: poly,
                            bbox: [minLon, minLat, maxLon, maxLat],
                            paintData: Array(1600).fill(0),
                            counters: [0, 0, 0, 0]
                        };
                        await DB.saveSite(newSite);
                        await App.loadSite(siteId);
                        alert(`新しい現場「${newSite.name}」を読み込みました。`);
                    } else if (isResultQR) {
                        // PC提出用 / 仲間とのマージ用QRを誤って「現場看板QR」として読んだ場合の扱い
                        if (!STATE.currentSite || STATE.activeSiteId !== data.id) {
                            alert("このQRコードは作業実績（マージ／PC提出）用です。現場を選択し、Sync Hub の「仲間と同期」から読み込んでください。");
                            return;
                        }
                        // 現在の現場とIDが一致している場合は、そのままマージしてあげる
                        for(let i=0; i<4; i++) {
                            STATE.currentSite.counters[i] += (data.c[i] || 0);
                        }
                        const extPaint = RLE.decode(data.p);
                        for(let i=0; i<1600; i++) {
                            if(extPaint[i] > STATE.currentSite.paintData[i]) {
                                STATE.currentSite.paintData[i] = extPaint[i]; 
                            }
                        }
                        await DB.saveSite(STATE.currentSite);
                        UI.renderCounters();
                        UI.renderSideMenu();
                        alert("作業実績QRを取り込み、現在の現場にマージしました。");
                    } else {
                        alert("対応していないQRフォーマットです");
                    }
                } catch(e) {
                    console.error(e);
                    alert("QRの解析に失敗しました。\n（現場看板QRまたは作業実績QRかご確認ください）");
                }
            }
        };

        window.addEventListener('DOMContentLoaded', App.init);

    </script>
</body>
</html>
