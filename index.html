<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>林業GIS Pro (Forestry Scout)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GeoTIFF は .tif 読み込み時にのみ遅延ロード（軽量化） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <!-- QRコード読取(jsQR) -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        body { 
            touch-action: none; 
            overflow: hidden; 
            background-color: #0f172a; 
            user-select: none;
            -webkit-user-select: none;
            overscroll-behavior: none; /* iOSのスワイプバック等を防止 */
        }
        .transition-transform { transition-property: transform; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
        .pop-anim { animation: pop 0.2s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #60a5fa; }
            100% { transform: scale(1); }
        }
        .sheet-collapsed { transform: translateY(calc(100% - 70px)) !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        /* カスタムQRスキャナーUI用スタイル */
        #qr-reader video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #qr-reader .qr-frame {
            position: absolute;
            inset: 12%;
            border: 2px solid #22c55e;
            border-radius: 12px;
            box-shadow: 0 0 24px rgba(34, 197, 94, 0.6);
            pointer-events: none;
        }
    </style>
</head>
<body class="text-slate-200 font-sans">

    <!-- 1. メインCanvas -->
    <canvas id="mapCanvas" class="fixed inset-0 w-full h-full z-0"></canvas>

    <!-- 2. ヘッダー -->
    <div id="gps-range-alert" class="hidden fixed top-14 left-0 right-0 z-50 bg-amber-600/90 text-white text-center py-1 text-sm font-bold">範囲外</div>
    <div id="offline-indicator" class="hidden fixed bottom-24 left-4 z-50 bg-slate-700/90 text-slate-200 px-3 py-2 rounded-lg text-xs font-bold shadow-lg">
        オフライン（キャッシュ表示）
    </div>
    <header id="app-header" class="fixed top-0 inset-x-0 h-14 bg-slate-900/80 backdrop-blur-md border-b border-slate-700 flex items-center justify-between px-4 z-40 transition-transform">
        <div class="flex items-center gap-2 overflow-hidden" onclick="UI.toggleSideMenu(true)">
            <!-- 現場アイコン -->
            <svg class="w-5 h-5 text-blue-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span id="header-site-name" class="font-bold text-sm truncate">⚠ 現場看板QRをスキャンしてください</span>
        </div>
    </header>

    <!-- 3. FAB (右上のアクションボタン) -->
    <div class="fixed right-4 top-20 flex flex-col gap-3 z-30">
        <!-- メニューボタン -->
        <button onclick="UI.toggleSideMenu(true)" class="w-12 h-12 bg-slate-800 rounded-full shadow-lg border border-slate-600 flex items-center justify-center active:bg-slate-700">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <!-- GPS 現在地ボタン (ナビゲーション矢印に変更) -->
        <button onclick="MAP.centerOnGPS()" class="w-12 h-12 bg-slate-800 rounded-full shadow-lg border border-slate-600 flex items-center justify-center active:bg-slate-700">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </button>
        <!-- QR スキャンボタン (カメラアイコンに変更) -->
        <button onclick="QR.startScan()" class="w-12 h-12 bg-blue-600 rounded-full shadow-lg border border-blue-500 flex items-center justify-center active:bg-blue-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>

            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
        </button>

            <button onclick="UI.closeBottomSheet(event)" class="px-4 py-2 bg-slate-700 rounded-full text-sm font-bold active:bg-slate-600">保存して戻る</button>
        </div>

            <button onclick="UI.switchTab('counter')" id="tab-btn-counter" class="flex-1 py-3 text-center font-bold border-b-2 border-transparent text-slate-500">カウンター</button>

            <button onclick="MAP.setBrush(4, '運材', '#a855f7')" class="paint-btn bg-slate-800 p-4 rounded-xl border-2 border-slate-700 flex flex-col items-center gap-2 active:bg-slate-700">
                <div class="w-8 h-8 rounded-full bg-purple-500/80 border border-purple-400"></div><span class="font-bold">運材 (4)</span>

                <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

    <div id="side-menu" class="fixed inset-y-0 right-0 w-1/2 max-w-[50vw] bg-slate-900 border-l border-slate-700 z-50 transform translate-x-full transition-transform duration-300 flex flex-col">

            <button onclick="UI.toggleSideMenu(false)" class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>

        <div class="flex-1 overflow-y-auto p-3 flex flex-col gap-3">

            <!-- Sync Hub -->
            <div class="bg-blue-900/30 rounded-lg px-3 py-2 border border-blue-800">
                <h3 class="text-[10px] text-blue-400 font-bold mb-2 uppercase tracking-wider">Sync</h3>

                    <button onclick="SYNC.showExportQR()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-xs font-bold">QR提出</button>
                </div>
            </div>

            <!-- 現場リスト -->
            <div>
                <h3 class="text-[10px] text-slate-500 font-bold mb-1 uppercase tracking-wider">現場リスト</h3>

                    <!-- 動的に生成 -->
                </div>

            <!-- オフラインキャッシュ -->

                <div id="layer-list" class="space-y-1 mb-2 max-h-24 overflow-y-auto text-xs"></div>
                <label class="w-full bg-slate-800 border border-slate-600 hover:bg-slate-700 text-xs py-2 rounded-lg font-bold flex items-center justify-center gap-1 cursor-pointer transition-colors text-slate-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>

    <!-- ポリゴン情報モーダル -->
    <div id="polygon-modal" class="fixed inset-0 bg-black/70 z-[55] hidden flex-col items-center justify-center p-4">
        <div class="bg-slate-900 rounded-xl border border-slate-700 w-full max-w-md max-h-[85vh] flex flex-col overflow-hidden shadow-xl">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center shrink-0">
                <h2 id="polygon-modal-title" class="font-bold text-lg">ポリゴン情報</h2>
                <button onclick="UI.closePolygonModal()" class="p-2 bg-slate-800 rounded-full hover:bg-slate-700"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <div id="polygon-modal-body" class="flex-1 overflow-y-auto p-4 text-sm space-y-3"></div>
            <div class="p-4 border-t border-slate-700 flex gap-2 shrink-0">
                <button id="polygon-modal-select-btn" onclick="UI.selectPolygonFromModal()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold">この現場を選択</button>
                <button id="polygon-modal-delete-btn" onclick="UI.deletePolygonFromModal()" class="px-4 py-3 bg-red-900/80 hover:bg-red-800 text-red-200 rounded-lg font-bold">削除</button>
            </div>
        </div>
    </div>

    <!-- 7. QRモーダル -->
    <div id="qr-modal" class="fixed inset-0 bg-black/90 z-[60] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 shrink-0">
            <h2 id="qr-modal-title" class="font-bold">QRスキャン</h2>
            <button onclick="QR.close()" class="p-2 bg-slate-800 rounded-full"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center p-4">
            
            <!-- スキャン画面 (カメラ / ファイル読込) -->
            <div id="qr-reader" class="w-full max-w-sm bg-white rounded-lg overflow-hidden border-2 border-slate-700 text-black flex flex-col">
                <div class="relative bg-black w-full aspect-square">
                    <video id="qr-video" class="w-full h-full" autoplay muted playsinline></video>
                    <div class="qr-frame"></div>
                </div>
                <div id="qr-chunk-progress" class="hidden mt-2 px-3 py-2 rounded-lg bg-amber-100 text-amber-800 text-sm font-bold"></div>
                <div id="qr-merge-status" class="hidden mt-2 px-3 py-2 rounded-lg bg-green-100 text-green-800 text-sm font-bold"></div>
                <div class="p-3 space-y-2 text-xs text-slate-700">
                    <p class="font-bold">カメラQRスキャン</p>
                    <p>QRコードを枠内にゆっくり近づけてください。うまく起動しない場合はブラウザのカメラ権限とHTTPS接続をご確認ください。</p>
                    <label class="mt-1 inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 cursor-pointer font-bold text-xs">
                        画像ファイルから読み取る
                        <input id="qr-file-input" type="file" accept="image/*" class="hidden" onchange="QR.scanImageFile(event)">
                    </label>
                </div>
                <canvas id="qr-canvas" class="hidden"></canvas>
            </div>
            
            <!-- 生成・表示画面 -->
            <div id="qr-display" class="hidden bg-white p-6 rounded-xl w-full max-w-sm flex flex-col items-center justify-center">
                <!-- 実際のQRコードが描画されるコンテナ -->
                <div id="qr-canvas-container" class="flex justify-center items-center bg-white p-2 rounded-lg"></div>
                <p class="mt-4 text-sm text-slate-600 font-bold">PC・仲間のモバイルで読み取ってください</p>
                <!-- バックアップ用テキスト -->
                <div class="mt-2 w-full h-16 overflow-y-auto bg-slate-100 p-2 rounded cursor-text" style="user-select: text; -webkit-user-select: text;">
                    <p class="font-mono text-[10px] break-all text-slate-800" id="qr-export-text"></p>
                </div>
                <button onclick="SYNC.copyExportQR()" class="mt-2 w-full bg-blue-100 text-blue-700 py-3 rounded-lg text-sm font-bold active:bg-blue-200 transition-colors">
                    クリップボードにコピー
                </button>
            </div>
        </div>
    </div>

    <!-- --- JavaScript ロジック --- -->
    <script>
        const DEFAULT_BBOX = [138, 34, 140, 36];
        const GSI_TILE_URL = 'https://cyberjapandata.gsi.go.jp/xyz/std/';
        const TILE_SIZE = 256;

        // Web Mercator 座標変換（案B: 汎用地図）
        const Mercator = {
            lonToWorldX: (lon, z) => ((lon + 180) / 360) * Math.pow(2, z) * TILE_SIZE,
            latToWorldY: (lat, z) => {
                const rad = lat * Math.PI / 180;
                const n = Math.log(Math.tan(Math.PI / 4 + rad / 2));
                return (1 - n / Math.PI) / 2 * Math.pow(2, z) * TILE_SIZE;
            },
            worldXToLon: (wx, z) => (wx / (Math.pow(2, z) * TILE_SIZE)) * 360 - 180,
            worldYToLat: (wy, z) => {
                const n = Math.PI * (1 - 2 * wy / (Math.pow(2, z) * TILE_SIZE));
                return 180 / Math.PI * (2 * Math.atan(Math.exp(n)) - Math.PI / 2);
            }
        };

        const TILES = {
            saveToIDB: (key, img) => {
                try {
                    const c = document.createElement('canvas');
                    c.width = img.width;
                    c.height = img.height;
                    c.getContext('2d').drawImage(img, 0, 0);
                    c.toBlob((blob) => {
                        const tx = DB.db.transaction('tileCache', 'readwrite');
                        tx.objectStore('tileCache').put({ key, blob });
                    });
                } catch (e) { console.warn('tile save:', e); }
            },
            getFromIDB: (key) => {
                return new Promise((resolve) => {
                    try {
                        const tx = DB.db.transaction('tileCache', 'readonly');
                        const req = tx.objectStore('tileCache').get(key);
                        req.onsuccess = () => {
                            const r = req.result;
                            if (!r || !r.blob) { resolve(null); return; }
                            const url = URL.createObjectURL(r.blob);
                            const img = new Image();
                            img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
                            img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
                            img.src = url;
                        };
                        req.onerror = () => resolve(null);
                    } catch (e) { resolve(null); }
                });
            },
            cacheBbox: async (bbox, zoom) => {
                const [w, s, e, n] = bbox;
                const n2 = Math.pow(2, zoom);
                const minTx = Math.max(0, MAP.lon2tileX(w, zoom));
                const maxTx = Math.min(n2 - 1, MAP.lon2tileX(e, zoom));
                const minTy = Math.max(0, MAP.lat2tileY(n, zoom));
                const maxTy = Math.min(n2 - 1, MAP.lat2tileY(s, zoom));
                let count = 0;
                for (let ty = minTy; ty <= maxTy; ty++) {
                    for (let tx = minTx; tx <= maxTx; tx++) {
                        await MAP.fetchTile(zoom, tx, ty);
                        count++;
                    }
                }
                return count;
            },
            cacheCurrentView: async () => {
                const bbox = MAP.getViewBbox();
                const zoom = STATE.viewZoom;
                const btn = document.getElementById('btn-cache-tiles');
                if (btn) { btn.disabled = true; btn.textContent = 'キャッシュ中...'; }
                try {
                    const n = await TILES.cacheBbox(bbox, zoom);
                    alert(`${n}枚のタイルをキャッシュしました。オフライン時にも表示されます。`);
                } catch (e) {
                    alert('キャッシュに失敗しました。');
                }
                if (btn) { btn.disabled = false; btn.textContent = '現在の範囲をキャッシュ'; }
            }
        };

        const STATE = {
            activeSiteId: null,
            currentSite: null, 
            mode: 'view', 
            brush: { val: 1, name: '伐採', color: '#ef4444' }, 
            bgImage: null,
            baseMap: 'online',
            tileCache: {},
            tileCacheKeys: [],
            TILE_CACHE_MAX: 500,
            layers: [],
            polygonSites: [],
            layersGeoTIFF: {},
            gpsPosition: null,
            gpsWatcherId: null,
            // 案B: 汎用地図ビュー（Web Mercator）
            viewCenter: { lon: 139.7, lat: 35.7 },
            viewZoom: 14,
            viewScale: 1,
            viewPan: { x: 0, y: 0 },
            countersConf: [
                { idx: 0, name: '伐採', step: 5, unit: '本' },
                { idx: 1, name: '集材', step: 5, unit: '本' },
                { idx: 2, name: '造材', step: 5, unit: '㎥' },
                { idx: 3, name: '運材', step: 5, unit: '㎥' }
            ]
        };

        // IndexedDB 管理
        const DB = {
            db: null,
            init: () => {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('ForestryScoutDB', 4);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('workSites')) {
                            db.createObjectStore('workSites', { keyPath: 'siteId' });
                        }
                        if (!db.objectStoreNames.contains('tileCache')) {
                            db.createObjectStore('tileCache', { keyPath: 'key' });
                        }
                        if (!db.objectStoreNames.contains('appConfig')) {
                            db.createObjectStore('appConfig', { keyPath: 'key' });
                        }
                        if (!db.objectStoreNames.contains('geotiffLayers')) {
                            db.createObjectStore('geotiffLayers', { keyPath: 'id' });
                        }

        // RLE圧縮エンジン（PC版と共通仕様：RLE文字列(A〜E)をBase64化）
        const RLE = {
            // arr: 長さ1600の数値配列(0〜4)
            encode: (arr) => {
                const map = ['A', 'B', 'C', 'D', 'E']; // 0〜4 を A〜E にマップ
                let rle = '';
                let count = 1;
                for (let i = 1; i <= arr.length; i++) {
                    if (arr[i] === arr[i - 1]) {
                        count++;
                    } else {
                        const v = arr[i - 1] || 0;
                        const letter = map[v] || 'A';
                        rle += `${count}${letter}`;
                        count = 1;
                    }
                }
                // ブラウザ環境前提なので btoa を利用
                try {
                    return btoa(rle);
                } catch (e) {
                    // 何らかの理由でBase64化に失敗した場合は素の文字列を返す（後段のデコーダで両対応）
                    return rle;
                }
            },
            decode: (str) => {
                const res = Array(1600).fill(0);
                if (!str) return res;

                // まず PC版仕様(Base64化されたRLE A〜E)として解釈を試みる
                try {
                    const rle = atob(str);
                    const revMap = { A: 0, B: 1, C: 2, D: 3, E: 4 };
                    let ptr = 0;
                    const regex = /(\d+)([ABCDE])/g;
                    let match;
                    while ((match = regex.exec(rle)) !== null) {
                        const count = parseInt(match[1], 10);
                        const val = revMap[match[2]] ?? 0;
                        for (let i = 0; i < count && ptr < 1600; i++) {
                            res[ptr++] = val;
                        }
                    }
                    return res;
                } catch (e) {
                    // Base64として解釈できなかった場合は、旧フォーマット(例: "30,21")として扱う
                    let ptr = 0;
                    str.split(',').forEach(part => {
                        const match = part.match(/(\d+)(\d)/);
                        if (match) {
                            const count = parseInt(match[1], 10);
                            const val = parseInt(match[2], 10);
                            for (let i = 0; i < count && ptr < 1600; i++) {
                                res[ptr++] = val;
                            }
                        }
                    });
                    return res;
                }
            }
        };

        const MAP = {
            canvas: null,
            ctx: null,
            isDrawing: false,
            
            lastTouch: null,
            initialPinchDist: null,
            initialScale: 1,

            init: () => {
                MAP.canvas = document.getElementById('mapCanvas');
                MAP.ctx = MAP.canvas.getContext('2d');
                MAP.resize();
                window.addEventListener('resize', MAP.resize);
                MAP.setupTouch();
                MAP.loop();
            },
            resize: () => {
                MAP.canvas.width = window.innerWidth;
                MAP.canvas.height = window.innerHeight;
            },
            setBrush: (val, name, color) => {
                STATE.brush = { val, name, color };
                UI.updateToolLabel();
                UI.collapseToToolbar(); 
                
                document.querySelectorAll('.paint-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-900/30'));
                event.currentTarget.classList.add('border-blue-500', 'bg-blue-900/30');
            },
            
            getViewBbox: () => {
                if (!MAP.canvas) return DEFAULT_BBOX;
                const cw = MAP.canvas.width, ch = MAP.canvas.height;
                const sw = MAP.screenToLonLat(0, 0);
                const se = MAP.screenToLonLat(cw, 0);
                const ne = MAP.screenToLonLat(cw, ch);
                const nw = MAP.screenToLonLat(0, ch);
                const lons = [sw.lon, se.lon, ne.lon, nw.lon];
                const lats = [sw.lat, se.lat, ne.lat, nw.lat];
                return [Math.min(...lons), Math.min(...lats), Math.max(...lons), Math.max(...lats)];
            },
            lonLatToScreen: (lon, lat) => {
                const z = STATE.viewZoom, s = STATE.viewScale;
                const cw = MAP.canvas ? MAP.canvas.width : window.innerWidth;
                const ch = MAP.canvas ? MAP.canvas.height : window.innerHeight;
                const wx = Mercator.lonToWorldX(lon, z);
                const wy = Mercator.latToWorldY(lat, z);
                const cwx = Mercator.lonToWorldX(STATE.viewCenter.lon, z);
                const cwy = Mercator.latToWorldY(STATE.viewCenter.lat, z);
                const scale = s;
                return {
                    x: (wx - cwx) * scale + cw / 2 + STATE.viewPan.x,
                    y: (wy - cwy) * scale + ch / 2 + STATE.viewPan.y
                };
            },
            screenToLonLat: (sx, sy) => {
                const z = STATE.viewZoom, s = STATE.viewScale;
                const cw = MAP.canvas ? MAP.canvas.width : window.innerWidth;
                const ch = MAP.canvas ? MAP.canvas.height : window.innerHeight;
                const cwx = Mercator.lonToWorldX(STATE.viewCenter.lon, z);
                const cwy = Mercator.latToWorldY(STATE.viewCenter.lat, z);
                const wx = (sx - cw / 2 - STATE.viewPan.x) / s + cwx;
                const wy = (sy - ch / 2 - STATE.viewPan.y) / s + cwy;
                return {
                    lon: Mercator.worldXToLon(wx, z),
                    lat: Mercator.worldYToLat(wy, z)
                };
            },
            lon2x: (lon, bbox) => {
                const bb = bbox || MAP.getViewBbox();
                const [w, s, e, n] = bb;
                return ((lon - w) / (e - w || 1)) * 800;
            },
            lat2y: (lat, bbox) => {
                const bb = bbox || MAP.getViewBbox();
                const [w, s, e, n] = bb;
                return ((n - lat) / (n - s || 1)) * 800; 
            },
            lon2tileX: (lon, z) => Math.floor((lon + 180) / 360 * Math.pow(2, z)),
            lat2tileY: (lat, z) => {
                const rad = lat * Math.PI / 180;
                return Math.floor((1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * Math.pow(2, z));
            },
            tileX2lon: (x, z) => x / Math.pow(2, z) * 360 - 180,
            tileY2lat: (y, z) => 180 / Math.PI * (2 * Math.atan(Math.exp(Math.PI - 2 * Math.PI * y / Math.pow(2, z))) - Math.PI / 2),
            getBboxZoom: (bbox) => {
                const [w, s, e, n] = bbox;
                const dy = n - s, dx = e - w;
                const span = Math.max(dx, dy * 1.5);
                if (span > 10) return 5;
                if (span > 5) return 6;
                if (span > 2) return 7;
                if (span > 1) return 8;
                if (span > 0.5) return 9;
                if (span > 0.2) return 10;
                if (span > 0.05) return 12;
                if (span > 0.02) return 13;
                if (span > 0.01) return 14;
                return 15;
            },
            fetchTile: async (z, x, y) => {
                const key = `${z}/${x}/${y}`;
                if (STATE.tileCache[key]) return STATE.tileCache[key];
                const cached = await TILES.getFromIDB(key);
                if (cached) {
                    STATE.tileCache[key] = cached;
                    STATE.tileCacheKeys.push(key);
                    if (STATE.tileCacheKeys.length > STATE.TILE_CACHE_MAX) {
                        const old = STATE.tileCacheKeys.shift();
                        delete STATE.tileCache[old];
                    }
                    return cached;
                }
                if (!navigator.onLine) return null;
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        STATE.tileCache[key] = img;
                        STATE.tileCacheKeys.push(key);
                        if (STATE.tileCacheKeys.length > STATE.TILE_CACHE_MAX) {
                            const old = STATE.tileCacheKeys.shift();
                            delete STATE.tileCache[old];
                        }
                        TILES.saveToIDB(key, img);
                        resolve(img);
                    };
                    img.onerror = () => resolve(null);
                    img.src = GSI_TILE_URL + `${z}/${x}/${y}.png`;
                });
            },
            drawBaseMap: (ctx, bbox, zoom) => {
                const [w, s, e, n] = bbox;
                const n2 = Math.pow(2, zoom);
                const minTx = Math.max(0, MAP.lon2tileX(w, zoom));
                const maxTx = Math.min(n2 - 1, MAP.lon2tileX(e, zoom));
                const minTy = Math.max(0, MAP.lat2tileY(n, zoom));
                const maxTy = Math.min(n2 - 1, MAP.lat2tileY(s, zoom));
                for (let ty = minTy; ty <= maxTy; ty++) {
                    for (let tx = minTx; tx <= maxTx; tx++) {
                        const key = `${zoom}/${tx}/${ty}`;
                        const img = STATE.tileCache[key];
                        if (img) {
                            const tLonW = MAP.tileX2lon(tx, zoom), tLonE = MAP.tileX2lon(tx + 1, zoom);
                            const tLatN = MAP.tileY2lat(ty, zoom), tLatS = MAP.tileY2lat(ty + 1, zoom);
                            const tl = MAP.lonLatToScreen(tLonW, tLatN);
                            const br = MAP.lonLatToScreen(tLonE, tLatS);
                            const wd = br.x - tl.x, hd = br.y - tl.y;
                            if (wd > 0 && hd > 0) ctx.drawImage(img, tl.x, tl.y, wd, hd);
                        } else {
                            MAP.fetchTile(zoom, tx, ty);
                        }
                    }
                }
            },

            setupTouch: () => {
                const getDistance = (touches) => {
                    const dx = touches[0].clientX - touches[1].clientX;
                    const dy = touches[0].clientY - touches[1].clientY;
                    return Math.sqrt(dx * dx + dy * dy);
                };
                
                const getCenter = (touches) => {
                    return {
                        x: (touches[0].clientX + touches[1].clientX) / 2,
                        y: (touches[0].clientY + touches[1].clientY) / 2
                    };
                };

                MAP.canvas.addEventListener('pointerdown', (e) => {
                    if (e.pointerType !== 'mouse') return; 
                    if (STATE.mode === 'paint') {
                        MAP.isDrawing = true;
                        MAP.paintCell(e.clientX, e.clientY);
                    } else {
                        MAP.lastTouch = { x: e.clientX, y: e.clientY };
                    }
                });
                MAP.canvas.addEventListener('pointermove', (e) => {
                    if (e.pointerType !== 'mouse') return;
                    if (STATE.mode === 'paint' && MAP.isDrawing) {
                        MAP.paintCell(e.clientX, e.clientY);
                    } else if (STATE.mode === 'view' && MAP.lastTouch) {
                        STATE.viewPan.x += e.clientX - MAP.lastTouch.x;
                        STATE.viewPan.y += e.clientY - MAP.lastTouch.y;
                        MAP.lastTouch = { x: e.clientX, y: e.clientY };
                    }
                });
                const endPointer = (e) => {
                    if (STATE.mode === 'view' && MAP.lastTouch && !MAP.initialPinchDist && (e.clientX != null || e.changedTouches?.[0])) {
                        const x = e.clientX ?? e.changedTouches?.[0]?.clientX ?? MAP.lastTouch.x;
                        const y = e.clientY ?? e.changedTouches?.[0]?.clientY ?? MAP.lastTouch.y;
                        const dx = x - MAP.lastTouch.x, dy = y - MAP.lastTouch.y;
                        if (dx * dx + dy * dy < 100) MAP.tapSelectPolygon(x, y);
                    }
                    MAP.isDrawing = false;
                    MAP.lastTouch = null;
                };
                MAP.canvas.addEventListener('pointerup', endPointer);
                MAP.canvas.addEventListener('pointerleave', () => { MAP.isDrawing = false; MAP.lastTouch = null; });

                MAP.canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) {
                        if (STATE.mode === 'paint') {
                            MAP.isDrawing = true;
                            MAP.paintCell(e.touches[0].clientX, e.touches[0].clientY);
                        } else {
                            MAP.lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                        }
                    } else if (e.touches.length === 2 && STATE.mode === 'view') {
                        MAP.initialPinchDist = getDistance(e.touches);
                        MAP.initialScale = STATE.viewScale;
                        MAP.lastTouch = getCenter(e.touches);
                    }
                }, { passive: false });

                MAP.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault(); 
                    if (e.touches.length === 1) {
                        if (STATE.mode === 'paint' && MAP.isDrawing) {
                            MAP.paintCell(e.touches[0].clientX, e.touches[0].clientY);
                        } else if (STATE.mode === 'view' && MAP.lastTouch && !MAP.initialPinchDist) {
                            STATE.viewPan.x += e.touches[0].clientX - MAP.lastTouch.x;
                            STATE.viewPan.y += e.touches[0].clientY - MAP.lastTouch.y;
                            MAP.lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                        }
                    } else if (e.touches.length === 2 && STATE.mode === 'view') {
                        const dist = getDistance(e.touches);
                        const center = getCenter(e.touches);
                        const cw = MAP.canvas.width, ch = MAP.canvas.height;
                        if (MAP.initialPinchDist) {
                            const newScale = Math.max(0.3, Math.min(MAP.initialScale * (dist / MAP.initialPinchDist), 5));
                            const z = STATE.viewZoom;
                            const cwx = Mercator.lonToWorldX(STATE.viewCenter.lon, z);
                            const cwy = Mercator.latToWorldY(STATE.viewCenter.lat, z);
                            const wx = (center.x - cw/2 - STATE.viewPan.x) / STATE.viewScale + cwx;
                            const wy = (center.y - ch/2 - STATE.viewPan.y) / STATE.viewScale + cwy;
                            const newCwx = wx - (center.x - cw/2 - STATE.viewPan.x) / newScale;
                            const newCwy = wy - (center.y - ch/2 - STATE.viewPan.y) / newScale;
                            STATE.viewCenter = {
                                lon: Mercator.worldXToLon(newCwx, z),
                                lat: Mercator.worldYToLat(newCwy, z)
                            };
                            STATE.viewScale = newScale;
                            STATE.viewPan.x += center.x - MAP.lastTouch.x;
                            STATE.viewPan.y += center.y - MAP.lastTouch.y;
                            MAP.lastTouch = center;
                        }
                    }
                }, { passive: false });

                const endTouch = (e) => {
                    if (STATE.mode === 'view' && e.changedTouches?.length === 1 && MAP.lastTouch && !MAP.initialPinchDist) {
                        const t = e.changedTouches[0];
                        const dx = t.clientX - MAP.lastTouch.x;
                        const dy = t.clientY - MAP.lastTouch.y;
                        if (dx * dx + dy * dy < 100) MAP.tapSelectPolygon(t.clientX, t.clientY);
                    }
                    MAP.isDrawing = false;
                    MAP.lastTouch = null;
                    MAP.initialPinchDist = null;
                };
                MAP.canvas.addEventListener('touchend', endTouch);
                MAP.canvas.addEventListener('touchcancel', endTouch);
                
                MAP.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = -e.deltaY * 0.001;
                    const newScale = Math.max(0.3, Math.min(STATE.viewScale * (1 + delta), 5));
                    const cw = MAP.canvas.width, ch = MAP.canvas.height;
                    const z = STATE.viewZoom;
                    const cwx = Mercator.lonToWorldX(STATE.viewCenter.lon, z);
                    const cwy = Mercator.latToWorldY(STATE.viewCenter.lat, z);
                    const wx = (e.clientX - cw/2 - STATE.viewPan.x) / STATE.viewScale + cwx;
                    const wy = (e.clientY - ch/2 - STATE.viewPan.y) / STATE.viewScale + cwy;
                    const newCwx = wx - (e.clientX - cw/2 - STATE.viewPan.x) / newScale;
                    const newCwy = wy - (e.clientY - ch/2 - STATE.viewPan.y) / newScale;
                    STATE.viewCenter = {
                        lon: Mercator.worldXToLon(newCwx, z),
                        lat: Mercator.worldYToLat(newCwy, z)
                    };
                    STATE.viewScale = newScale;
                }, {passive: false});
            },

            loadBackground: async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                UI.toggleSideMenu(false);
                alert("地図を読み込んでいます...");
                try {
                    if (file.name.endsWith('.tif') || file.name.endsWith('.tiff')) {
                        if (typeof GeoTIFF === 'undefined') {
                            await new Promise((res, rej) => {
                                const s = document.createElement('script');
                                s.src = 'https://cdn.jsdelivr.net/npm/geotiff';
                                s.onload = res; s.onerror = rej;
                                document.head.appendChild(s);
                            });
                        }
                        const arrayBuffer = await file.arrayBuffer();
                        const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
                        const image = await tiff.getImage();
                        const width = image.getWidth();
                        const height = image.getHeight();
                        const rasters = await image.readRasters();
                        const offscreen = document.createElement('canvas');
                        offscreen.width = width;
                        offscreen.height = height;
                        const ctx = offscreen.getContext('2d');
                        const imgData = ctx.createImageData(width, height);
                        let r, g, b;
                        for (let i = 0; i < width * height; i++) {
                            r = rasters[0][i];
                            g = rasters.length > 1 ? rasters[1][i] : r;
                            b = rasters.length > 2 ? rasters[2][i] : r;
                            imgData.data[i * 4] = r;
                            imgData.data[i * 4 + 1] = g;
                            imgData.data[i * 4 + 2] = b;
                            imgData.data[i * 4 + 3] = 255;
                        }
                        ctx.putImageData(imgData, 0, 0);
                        const bbox = image.getBoundingBox ? image.getBoundingBox() : null;
                        const geoBbox = bbox && bbox.length >= 4 ? [bbox[0], bbox[1], bbox[2], bbox[3]] : MAP.getViewBbox();
                        LAYERS.addGeoTIFF(offscreen, file.name, geoBbox);
                        alert("地図の読み込みが完了しました。");
                    } else if (file.type === 'image/jpeg' || file.type === 'image/png') {
                        const url = URL.createObjectURL(file);
                        const img = new Image();
                        img.onload = () => { 
                            LAYERS.addGeoTIFF(img, file.name, MAP.getViewBbox());
                            alert("地図の読み込みが完了しました。");
                        };
                        img.onerror = () => alert("画像の読み込みに失敗しました。");
                        img.src = url;
                    } else {
                        alert("対応していないファイル形式です。");
                    }
                } catch (err) {
                    console.error(err);
                    alert("地図画像の読み込みに失敗しました。ファイル形式を確認してください。");
                }
                e.target.value = "";
            },

            paintCell: (screenX, screenY) => {
                if (!STATE.currentSite || !STATE.currentSite.bbox) return;
                const ll = MAP.screenToLonLat(screenX, screenY);
                const [w, s, e, n] = STATE.currentSite.bbox;
                const col = Math.floor(((ll.lon - w) / (e - w || 1)) * 40);
                const row = Math.floor(((n - ll.lat) / (n - s || 1)) * 40);
                if (col >= 0 && col < 40 && row >= 0 && row < 40) {
                    const idx = row * 40 + col;
                    if (STATE.currentSite.paintData[idx] !== STATE.brush.val) {
                        STATE.currentSite.paintData[idx] = STATE.brush.val;
                        if(navigator.vibrate) navigator.vibrate(5); 
                    }
                }
            },

            loop: () => {
                MAP.ctx.clearRect(0, 0, MAP.canvas.width, MAP.canvas.height);
                MAP.ctx.fillStyle = '#0f172a'; 
                MAP.ctx.fillRect(0, 0, MAP.canvas.width, MAP.canvas.height);

                const viewBbox = MAP.getViewBbox();
                const zoom = STATE.viewZoom;
                const cw = MAP.canvas.width, ch = MAP.canvas.height;

                if (STATE.baseMap === 'online') {
                    MAP.drawBaseMap(MAP.ctx, viewBbox, zoom);
                }

                STATE.layers.filter(l => l.visible).forEach(layer => {
                    MAP.ctx.globalAlpha = layer.opacity ?? 1;
                    if (layer.type === 'polygons' && STATE.polygonSites && STATE.polygonSites.length > 0) {
                        STATE.polygonSites.forEach(site => {
                            if (!site.polygon || !site.polygon.length) return;
                            MAP.ctx.beginPath();
                            site.polygon.forEach((p, i) => {
                                const pt = MAP.lonLatToScreen(p[0], p[1]);
                                if (i === 0) MAP.ctx.moveTo(pt.x, pt.y);
                                else MAP.ctx.lineTo(pt.x, pt.y);
                            });
                            MAP.ctx.closePath();
                            MAP.ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                            MAP.ctx.fill();
                            MAP.ctx.lineWidth = 2;
                            MAP.ctx.strokeStyle = site.siteId === STATE.activeSiteId ? '#ef4444' : '#64748b';
                            MAP.ctx.stroke();
                        });
                    } else if (layer.type === 'geotiff' && STATE.layersGeoTIFF[layer.id]) {
                        const gtb = layer.geoTiffBbox || viewBbox;
                        const [gw, gs, ge, gn] = gtb;
                        const tl = MAP.lonLatToScreen(gw, gn);
                        const br = MAP.lonLatToScreen(ge, gs);
                        const img = STATE.layersGeoTIFF[layer.id];
                        if (img && br.x > tl.x && br.y > tl.y) {
                            MAP.ctx.drawImage(img, tl.x, tl.y, br.x - tl.x, br.y - tl.y);
                        }
                    }
                    MAP.ctx.globalAlpha = 1;
                });

                // ペイント・カウンターは「現在選択中の現場」にのみ紐づく（bbox 上の 40x40 グリッド）
                if (STATE.currentSite && STATE.currentSite.bbox) {
                    const [w, s, e, n] = STATE.currentSite.bbox;
                    const topL = MAP.lonLatToScreen(w, n);
                    const botR = MAP.lonLatToScreen(e, s);
                    const pW = (botR.x - topL.x) / 40, pH = (botR.y - topL.y) / 40;
                    MAP.ctx.globalAlpha = 0.6;
                    for (let r = 0; r < 40; r++) {
                        for (let c = 0; c < 40; c++) {
                            const val = STATE.currentSite.paintData[r * 40 + c];
                            if (val > 0) {
                                switch(val) {
                                    case 1: MAP.ctx.fillStyle = '#ef4444'; break; 
                                    case 2: MAP.ctx.fillStyle = '#3b82f6'; break; 
                                    case 3: MAP.ctx.fillStyle = '#eab308'; break; 
                                    case 4: MAP.ctx.fillStyle = '#a855f7'; break; 
                                }
                                MAP.ctx.fillRect(topL.x + c * pW, topL.y + r * pH, pW + 1, pH + 1);
                            }
                        }
                    }
                    MAP.ctx.globalAlpha = 1.0;
                    MAP.ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    MAP.ctx.lineWidth = 1;
                    MAP.ctx.strokeRect(topL.x, topL.y, botR.x - topL.x, botR.y - topL.y);
                }

                if (STATE.gpsPosition) {
                    const pt = MAP.lonLatToScreen(STATE.gpsPosition.longitude, STATE.gpsPosition.latitude);
                    if (pt.x >= -20 && pt.x <= cw + 20 && pt.y >= -20 && pt.y <= ch + 20) {
                        MAP.ctx.fillStyle = '#2563eb';
                        MAP.ctx.strokeStyle = '#fff';
                        MAP.ctx.lineWidth = 2;
                        MAP.ctx.beginPath();
                        MAP.ctx.arc(pt.x, pt.y, 8, 0, Math.PI * 2);
                        MAP.ctx.fill();
                        MAP.ctx.stroke();
                    }
                }


                if (document.hidden) {
                    requestAnimationFrame(MAP.loop);
                    return;
                }
                if (STATE.gpsPosition && STATE.currentSite) {
                    const [w, s, e, n] = STATE.currentSite.bbox;
                    const lon = STATE.gpsPosition.longitude, lat = STATE.gpsPosition.latitude;
                    if (lon < w || lon > e || lat < s || lat > n) {
                        const alertEl = document.getElementById('gps-range-alert');
                        if (alertEl) alertEl.classList.remove('hidden');
                    } else {
                        const alertEl = document.getElementById('gps-range-alert');
                        if (alertEl) alertEl.classList.add('hidden');
                    }
                }

                requestAnimationFrame(MAP.loop);
            },
            
            pointInPolygon: (lon, lat, polygon) => {
                if (!polygon || polygon.length < 3) return false;
                let inside = false;
                const n = polygon.length;
                for (let i = 0, j = n - 1; i < n; j = i++) {
                    const xi = polygon[i][0], yi = polygon[i][1];
                    const xj = polygon[j][0], yj = polygon[j][1];
                    if (((yi > lat) !== (yj > lat)) && (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi)) inside = !inside;
                }
                return inside;
            },
            tapSelectPolygon: (screenX, screenY) => {
                const ll = MAP.screenToLonLat(screenX, screenY);
                if (!STATE.polygonSites || STATE.polygonSites.length === 0) return;
                for (let i = STATE.polygonSites.length - 1; i >= 0; i--) {
                    const site = STATE.polygonSites[i];
                    if (site.polygon && MAP.pointInPolygon(ll.lon, ll.lat, site.polygon)) {
                        UI.showPolygonModal(site);
                        break;
                    }
                }
            },
            setZoomDelta: (delta) => {
                const newZ = Math.max(5, Math.min(18, STATE.viewZoom + delta));
                if (newZ !== STATE.viewZoom) {
                    STATE.viewZoom = newZ;
                    UI.updateZoomDisplay();
                }
            },
            centerOnGPS: () => {
                if (STATE.gpsPosition) {
                    STATE.viewCenter = { lon: STATE.gpsPosition.longitude, lat: STATE.gpsPosition.latitude };
                    STATE.viewPan = { x: 0, y: 0 };
                } else if (STATE.currentSite && STATE.currentSite.bbox) {
                    const [w, s, e, n] = STATE.currentSite.bbox;
                    STATE.viewCenter = { lon: (w + e) / 2, lat: (s + n) / 2 };
                    STATE.viewZoom = MAP.getBboxZoom(STATE.currentSite.bbox);
                    STATE.viewPan = { x: 0, y: 0 };
                }
            }
        };

        const SYNC = {
            openMergeScanner: () => {
                if(!STATE.currentSite) return alert("現場を選択してください");
                QR.startScan((data) => {
                    try {
                        const payload = JSON.parse(data);
                        const isMergePayload = payload && payload.id && Array.isArray(payload.c) && typeof payload.p === 'string';
                        const isSitePayload = payload && payload.id && Array.isArray(payload.poly);

                        if (isMergePayload) {
                            if(payload.id !== STATE.activeSiteId) {
                                alert("別の現場のデータです。マージできません。");
                                return;
                            }
                            for(let i=0; i<4; i++) {
                                STATE.currentSite.counters[i] += (payload.c[i] || 0);
                            }
                            const extPaint = RLE.decode(payload.p);
                            for(let i=0; i<1600; i++) {
                                if(extPaint[i] > STATE.currentSite.paintData[i]) {
                                    STATE.currentSite.paintData[i] = extPaint[i]; 
                                }
                            }
                            DB.saveSite(STATE.currentSite);
                            UI.renderCounters();
                            UI.renderSideMenu();
                            if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
                        } else if (isSitePayload) {
                            alert("このQRコードは新しい現場登録用です。ヘッダーのメッセージか右上のカメラボタンから読み込んでください。");
                        } else {
                            alert("無効なQRデータです");
                        }
                    } catch(e) {
                        alert("QRの解析に失敗しました。");
                        console.error(e);
                    }
                });
            },
            showExportQR: () => {
                if(!STATE.currentSite) return alert("現場を選択してください");
                const payload = {
                    id: STATE.activeSiteId,
                    c: STATE.currentSite.counters,
                    p: RLE.encode(STATE.currentSite.paintData)
                };
                const jsonStr = JSON.stringify(payload);
                document.getElementById('qr-modal-title').innerText = "作業実績QR";
                document.getElementById('qr-modal').classList.remove('hidden');
                document.getElementById('qr-display').classList.remove('hidden');
                document.getElementById('qr-reader').classList.add('hidden');
                
                const qrContainer = document.getElementById('qr-canvas-container');
                qrContainer.innerHTML = ''; 
                new QRCode(qrContainer, {
                    text: jsonStr,
                    width: 240,
                    height: 240,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L 
                });
                
                document.getElementById('qr-export-text').innerText = jsonStr; 
            },
            copyExportQR: () => {
                const text = document.getElementById('qr-export-text').innerText;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert("クリップボードにコピーしました！");
                } catch (err) {
                    alert("コピーに失敗しました。お手数ですが手動で選択してコピーしてください。");
                }
                document.body.removeChild(textArea);
            }
        };

        // 現場看板の分割QR（F1/4|...）を順に集めて結合する用
        let signboardChunkState = { total: 0, chunks: {} };
        let lastSignboardKey = '';
        let lastSignboardTime = 0;
        function handleSignboardChunk(text) {
            const m = text.match(/^F(\d+)\/(\d+)\|([\s\S]*)$/);
            if (!m) return false;
            const idx = parseInt(m[1], 10), total = parseInt(m[2], 10), content = m[3];
            const key = 'F' + idx + '/' + total;
            if (Date.now() - lastSignboardTime < 1500 && lastSignboardKey === key) return true;
            if (signboardChunkState.total !== total) signboardChunkState = { total, chunks: {} };
            signboardChunkState.chunks[idx] = content;
            lastSignboardKey = key;
            lastSignboardTime = Date.now();
            const keys = Object.keys(signboardChunkState.chunks);
            if (keys.length === total) {
                let full = '';
                for (let i = 1; i <= total; i++) full += (signboardChunkState.chunks[i] || '');
                signboardChunkState = { total: 0, chunks: {} };
                lastSignboardKey = '';
                lastSignboardTime = 0;
                QR.close();
                App.handleNewSiteQR(full);
            } else {
                const next = [1,2,3,4,5,6].slice(0, total).find(j => !signboardChunkState.chunks[j]);
                const labels = ['①','②','③','④','⑤','⑥'];
                const el = document.getElementById('qr-chunk-progress');
                if (el) { el.classList.remove('hidden'); el.textContent = keys.length + "/" + total + " 枚読み取りました。次は " + (labels[next-1] || next) + " をスキャン"; }
            }
            return true;
        }

        // 選択地物を直接QR化（1/3|...）のチャンクを集めてLZ復号し現場登録
        let directChunkState = { total: 0, chunks: {} };
        let lastChunkKey = '';
        let lastChunkTime = 0;
        const CHUNK_COOLDOWN_MS = 1500;
        async function handleDirectQRChunk(text) {
            const m = text.match(/^(\d+)\/(\d+)\|([\s\S]*)$/);
            if (!m) return false;
            const idx = parseInt(m[1], 10), total = parseInt(m[2], 10), content = m[3];
            const key = idx + '/' + total;
            if (Date.now() - lastChunkTime < CHUNK_COOLDOWN_MS && lastChunkKey === key) return true;
            if (directChunkState.total !== total) directChunkState = { total, chunks: {} };
            directChunkState.chunks[idx] = content;
            lastChunkKey = key;
            lastChunkTime = Date.now();
            const keys = Object.keys(directChunkState.chunks);
            if (keys.length !== total) {
                const next = [1,2,3,4,5,6,7,8].slice(0, total).find(j => !directChunkState.chunks[j]);
                const labels = ['①','②','③','④','⑤','⑥'];
                const el = document.getElementById('qr-chunk-progress');
                if (el) { el.classList.remove('hidden'); el.textContent = keys.length + "/" + total + " 枚読み取りました。次は " + (labels[next-1] || next) + " をスキャン"; }
                return true;
            }
            let full = '';
            for (let i = 1; i <= total; i++) full += (directChunkState.chunks[i] || '');
            directChunkState = { total: 0, chunks: {} };
            lastChunkKey = '';
            lastChunkTime = 0;
            try {
                const raw = (typeof LZString !== 'undefined' && LZString.decompressFromEncodedURIComponent)
                    ? LZString.decompressFromEncodedURIComponent(full)
                    : full;
                const parsed = JSON.parse(raw || '{}');
                QR.close();
                if (parsed.type === 'featureCollection' && parsed.geom) {
                    parsed.id = parsed.id || 'import-' + Date.now();
                    if (!parsed.name) parsed.name = parsed.id;
                }
                await App.handleNewSiteQR(JSON.stringify(parsed));
            } catch (e) {
                console.error(e);
                alert("地物データの復号に失敗しました。");
            }
            return true;
        }

        // jsQR + getUserMedia を使ったカスタムQRスキャナー
        const QR = {
            stream: null,
            frameRequestId: null,
            callback: null,
            scanning: false,
            startScan: (callback = null, options = {}) => {
                signboardChunkState = { total: 0, chunks: {} };
                directChunkState = { total: 0, chunks: {} };
                lastSignboardKey = '';
                lastSignboardTime = 0;
                lastChunkKey = '';
                lastChunkTime = 0;
                QR.mergeMode = options.mergeMode || false;
                QR.mergeCount = 0;
                const prog = document.getElementById('qr-chunk-progress');
                if (prog) { prog.classList.add('hidden'); prog.textContent = ''; }
                const mstat = document.getElementById('qr-merge-status');
                if (mstat) { mstat.classList.add('hidden'); mstat.textContent = ''; }
                UI.toggleSideMenu(false);
                QR.callback = callback;
                document.getElementById('qr-modal-title').innerText = QR.mergeMode ? "仲間と同期 (マージ)" : "QRスキャン";
                document.getElementById('qr-modal').classList.remove('hidden');
                document.getElementById('qr-display').classList.add('hidden');
                document.getElementById('qr-reader').classList.remove('hidden');

                QR.startCamera();
            },
            startCamera: () => {
                const video = document.getElementById('qr-video');
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("この端末やブラウザではカメラが利用できません。画像ファイルからの読み取りをご利用ください。");
                    return;
                }
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' } }
                }).then(stream => {
                    QR.stream = stream;
                    video.srcObject = stream;
                    video.play().catch(() => {});
                    QR.scanning = true;
                    QR.scanLoop();
                }).catch(err => {
                    console.error(err);
                    alert("カメラを起動できませんでした。ブラウザのカメラ権限やHTTPS接続をご確認ください。");
                });
            },
            scanLoop: () => {
                if (!QR.scanning) return;
                const video = document.getElementById('qr-video');
                const canvas = document.getElementById('qr-canvas');
                const ctx = canvas.getContext('2d');

                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    const width = video.videoWidth;
                    const height = video.videoHeight;
                    if (width && height) {
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(video, 0, 0, width, height);
                        const imageData = ctx.getImageData(0, 0, width, height);
                        const code = jsQR(imageData.data, width, height, { inversionAttempts: "dontInvert" });
                        if (code && code.data) {
                            if (QR.mergeMode) {
                                const now = Date.now();
                                const key = code.data.slice(0, 80);
                                if (key === QR.lastMergeKey && now - QR.lastMergeTime < 2000) {}
                                else {
                                    QR.lastMergeKey = key;
                                    QR.lastMergeTime = now;
                                    QR.handleResult(code.data);
                                }
                            } else {
                                QR.handleResult(code.data);
                            }
                        }
                    }
                }
                if (QR.scanning) QR.frameRequestId = requestAnimationFrame(QR.scanLoop);
            },
            scanImageFile: (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('qr-canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: "dontInvert" });
                        if (code && code.data) {
                            QR.handleResult(code.data);
                        } else {
                            alert("QRコードを検出できませんでした。画像のピントや明るさをご確認ください。");
                        }
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
                event.target.value = "";
            },
            handleResult: (decodedText) => {
                if (/^F\d+\/\d+\|/.test(decodedText)) {
                    handleSignboardChunk(decodedText);
                    return;
                }
                if (/^\d+\/\d+\|/.test(decodedText)) {
                    handleDirectQRChunk(decodedText);
                    return;
                }
                let keepOpen = false;
                if (QR.callback) {
                    const result = QR.callback(decodedText);
                    keepOpen = result === false;
                } else {
                    App.handleNewSiteQR(decodedText);
                }
                if (!keepOpen) QR.close();
            },
            stopCamera: () => {
                QR.scanning = false;
                if (QR.frameRequestId) {
                    cancelAnimationFrame(QR.frameRequestId);
                    QR.frameRequestId = null;
                }
                if (QR.stream) {
                    QR.stream.getTracks().forEach(t => t.stop());
                    QR.stream = null;
                }
                const video = document.getElementById('qr-video');
                if (video) {
                    video.srcObject = null;
                }
            },
            close: () => {
                QR.stopCamera();
                document.getElementById('qr-modal').classList.add('hidden');
            }
        };

        const App = {
            init: async () => {
                await DB.init();
                const sites = await DB.getAllSites();
                if(sites.length > 0) {
                    sites.sort((a,b) => b.lastUpdated - a.lastUpdated);
                    await App.loadSite(sites[0].siteId);
                } else {
                    const viewCfg = await DB.getConfig('viewState');
                    if (viewCfg?.center && viewCfg?.zoom != null) {
                        STATE.viewCenter = viewCfg.center;
                        STATE.viewZoom = viewCfg.zoom;
                    } else {
                        STATE.viewCenter = { lon: 139.7, lat: 35.7 };
                        STATE.viewZoom = 14;
                    }
                    STATE.viewScale = 1;
                    STATE.viewPan = { x: 0, y: 0 };
                }
                await LAYERS.loadGeoTIFFs();
                await LAYERS.syncFromSites();
                UI.init();
                UI.updateOnlineStatus();
                window.addEventListener('online', UI.updateOnlineStatus);
                window.addEventListener('offline', UI.updateOnlineStatus);
                MAP.init();
                window.addEventListener('beforeunload', () => {
                    DB.setConfig('viewState', { center: STATE.viewCenter, zoom: STATE.viewZoom });
                });
                if (navigator.geolocation) {
                    STATE.gpsWatcherId = navigator.geolocation.watchPosition(
                        (p) => { STATE.gpsPosition = p.coords; },
                        () => {},
                        { enableHighAccuracy: true, maximumAge: 10000 }
                    );
                }
            },
            loadSite: async (siteId) => {
                const site = await DB.getSite(siteId);
                if (site) {
                    STATE.activeSiteId = site.siteId;
                    STATE.currentSite = site;
                    if (site.bbox) {
                        const [w, s, e, n] = site.bbox;
                        STATE.viewCenter = { lon: (w + e) / 2, lat: (s + n) / 2 };
                        STATE.viewZoom = MAP.getBboxZoom(site.bbox);
                        STATE.viewScale = 1;
                        STATE.viewPan = { x: 0, y: 0 };
                        DB.setConfig('viewState', { center: STATE.viewCenter, zoom: STATE.viewZoom });
                    }
                    UI.updateHeader();
                    UI.renderCounters();
                    UI.toggleSideMenu(false);
                }
            },
            loadSiteAndCenter: async (siteId) => {
                await App.loadSite(siteId);
            },
            deletePolygon: async (siteId) => {
                if (!confirm('このポリゴン（現場）を削除しますか？')) return;
                await DB.deleteSite(siteId);
                if (STATE.currentSite && STATE.currentSite.siteId === siteId) {
                    const rest = await DB.getAllSites();
                    if (rest.length > 0) {
                        await App.loadSite(rest[0].siteId);
                    } else {
                        STATE.currentSite = null;
                        STATE.activeSiteId = null;
                        UI.updateHeader();
                        UI.renderCounters();
                    }
                }
                await LAYERS.syncFromSites();
                await UI.renderSideMenu();
                UI.updateHeader();
            },
            handleNewSiteQR: async (jsonStr) => {
                try {
                    const raw = (jsonStr && typeof jsonStr === 'string') ? jsonStr.trim() : String(jsonStr);
                    if (!raw) { alert("QRの内容が空です"); return; }
                    const data = JSON.parse(raw);

                    // --- 1) 現場看板QR (PC → モバイル)
                    // 超コンパクト: { i, n?, b: \"wwwwwweeeeee\" }  (base36で bbox をエンコード)
                    // 標準: { id, name?, poly: [[lon,lat]...] }
                    // 旧: { type:\"checkin\", id, name, geom: GeoJSON FeatureCollection }
                    let poly = null;
                    let siteId = data.id || data.i;
                    let siteName = data.name || data.n || siteId;

                    if (typeof data.b === 'string' && data.b.length === 12) {
                        const decodePair = (str) => {
                            const lonInt = parseInt(str.slice(0, 3), 36);
                            const latInt = parseInt(str.slice(3, 6), 36);
                            const lon = lonInt / 100 - 180;
                            const lat = latInt / 100 - 90;
                            return [lon, lat];
                        };
                        const [w, s] = decodePair(data.b.slice(0, 6));
                        const [e, n] = decodePair(data.b.slice(6, 12));
                        poly = [[w, s], [e, s], [e, n], [w, n], [w, s]];
                    } else if (Array.isArray(data.b) && data.b.length >= 4) {
                        const [w, s, e, n] = data.b;
                        poly = [[w, s], [e, s], [e, n], [w, n], [w, s]];
                    } else if (Array.isArray(data.poly)) {
                        poly = data.poly;
                    } else if (data.geom && Array.isArray(data.geom.features) && data.geom.features.length > 0) {
                        const g = data.geom.features[0].geometry;
                        if (g && g.type === 'Polygon' && Array.isArray(g.coordinates) && g.coordinates.length > 0) {
                            poly = g.coordinates[0];
                        } else if (g && g.type === 'MultiPolygon' && Array.isArray(g.coordinates) && g.coordinates.length > 0) {
                            poly = g.coordinates[0][0];
                        } else if (g && g.type === 'LineString' && Array.isArray(g.coordinates) && g.coordinates.length > 0) {
                            poly = g.coordinates.concat([g.coordinates[0]]);
                        }
                    }

                    const isResultQR = data && data.id && Array.isArray(data.c) && typeof data.p === 'string';

                    // 直接QR化: FeatureCollection の全 feature をそれぞれ現場として登録（属性も保持）
                    if (data.geom && Array.isArray(data.geom.features) && data.geom.features.length > 0) {
                        const baseName = data.name || 'layer';
                        const savedIds = [];
                        const ts = Date.now();
                        for (let i = 0; i < data.geom.features.length; i++) {
                            const f = data.geom.features[i];
                            const g = f.geometry;
                            let featPoly = null;
                            if (g && g.type === 'Polygon' && Array.isArray(g.coordinates) && g.coordinates.length > 0) featPoly = g.coordinates[0];
                            else if (g && g.type === 'MultiPolygon' && Array.isArray(g.coordinates) && g.coordinates.length > 0) featPoly = g.coordinates[0][0];
                            else if (g && g.type === 'LineString' && Array.isArray(g.coordinates) && g.coordinates.length > 0) featPoly = g.coordinates.concat([g.coordinates[0]]);
                            if (!featPoly || featPoly.length < 3) continue;
                            let minLon=180, maxLon=-180, minLat=90, maxLat=-90;
                            featPoly.forEach(p => {
                                if(p[0] < minLon) minLon = p[0];
                                if(p[0] > maxLon) maxLon = p[0];
                                if(p[1] < minLat) minLat = p[1];
                                if(p[1] > maxLat) maxLat = p[1];
                            });
                            const props = f.properties || {};
                            const featName = props.name || props.名称 || props.名前 || props.Name || (baseName + ' ' + (i + 1));
                            const featId = (f.id != null ? String(f.id) : null) || props.id || ('import-' + ts + '-' + i);
                            const attrs = {};
                            Object.keys(props).forEach(k => { if (k !== 'geometry' && k !== 'style') attrs[k] = props[k]; });
                            const newSite = {
                                siteId: featId,
                                name: featName,
                                polygon: featPoly,
                                bbox: [minLon, minLat, maxLon, maxLat],
                                paintData: Array(1600).fill(0),
                                counters: [0, 0, 0, 0],
                                attributes: Object.keys(attrs).length > 0 ? attrs : undefined
                            };
                            await DB.saveSite(newSite);
                            savedIds.push(featId);
                        }
                        if (savedIds.length > 0) {
                            await LAYERS.syncFromSites();
                            await App.loadSite(savedIds[0]);
                            await UI.renderSideMenu();
                            alert(savedIds.length + '件の現場を読み込みました。');
                        }
                    } else {
                    const isSiteQR = siteId && Array.isArray(poly);
                    if (isSiteQR) {
                        let minLon=180, maxLon=-180, minLat=90, maxLat=-90;
                        poly.forEach(p => {
                            if(p[0] < minLon) minLon = p[0];
                            if(p[0] > maxLon) maxLon = p[0];
                            if(p[1] < minLat) minLat = p[1];
                            if(p[1] > maxLat) maxLat = p[1];
                        });
                        
                        const newSite = {
                            siteId: siteId,
                            name: siteName,
                            polygon: poly,
                            bbox: [minLon, minLat, maxLon, maxLat],
                            paintData: Array(1600).fill(0),
                            counters: [0, 0, 0, 0]
                        };
                        await DB.saveSite(newSite);
                        await LAYERS.syncFromSites();
                        await App.loadSite(siteId);
                        await UI.renderSideMenu();
                        alert(`新しい現場「${newSite.name}」を読み込みました。`);
                    } else if (isResultQR) {
                        // PC提出用 / 仲間とのマージ用QRを誤って「現場看板QR」として読んだ場合の扱い
                        if (!STATE.currentSite || STATE.activeSiteId !== data.id) {
                            alert("このQRコードは作業実績（マージ／PC提出）用です。現場を選択し、Sync Hub の「仲間と同期」から読み込んでください。");
                            return;
                        }
                        // 現在の現場とIDが一致している場合は、そのままマージしてあげる
                        for(let i=0; i<4; i++) {
                            STATE.currentSite.counters[i] += (data.c[i] || 0);
                        }
                        const extPaint = RLE.decode(data.p);
                        for(let i=0; i<1600; i++) {
                            if(extPaint[i] > STATE.currentSite.paintData[i]) {
                                STATE.currentSite.paintData[i] = extPaint[i]; 
                            }
                        }
                        await DB.saveSite(STATE.currentSite);
                        UI.renderCounters();
                        UI.renderSideMenu();
                        alert("作業実績QRを取り込み、現在の現場にマージしました。");
                    } else {
                        alert("対応していないQRフォーマットです");
                    }
                    }
                } catch(e) {
                    console.error(e);
                    alert("QRの解析に失敗しました。\n（現場看板QRまたは作業実績QRかご確認ください）");
                }
            }
        };

        window.addEventListener('DOMContentLoaded', App.init);

    </script>
</body>
</html>
